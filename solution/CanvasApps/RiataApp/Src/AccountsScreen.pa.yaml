Screens:
  AccountsScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      Width: =App.Width
    Children:
      - ContainerAs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - AccountsGallery:
                Control: Gallery@2.15.0
                Variant: VariableHeight
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Default: ={}
                  Height: |-
                    =Sum(
                        Parent.Height,
                        -Self.Y,
                        -ActionContainerAs.Height
                    )
                  Items: |-
                    =If(
                        gvarAccountsFilter.Applied,
                        SortByColumns(
                            Search(
                                Filter(
                                    BankAccounts,
                                    AccessToken.Profile.Guid = gvarSelectedRole.Profile.Guid,
                                    AccessToken.Guid in ShowColumns(
                                        gvarAccountsFilter.AccessTokens,
                                        Guid
                                    )
                                ),
                                TrimEnds(SearchInputAs.Text),
                                Name,
                                OfficialName,
                                InstitutionName
                            ),
                            "mda_name",
                            SortOrder.Ascending,
                            "mda_institutionname",
                            SortOrder.Ascending
                        ),
                        SortByColumns(
                            Search(
                                Filter(
                                    BankAccounts,
                                    AccessToken.Profile.Guid = gvarSelectedRole.Profile.Guid
                                ),
                                TrimEnds(SearchInputAs.Text),
                                Name,
                                OfficialName,
                                InstitutionName
                            ),
                            "mda_name",
                            SortOrder.Ascending,
                            "mda_institutionname",
                            SortOrder.Ascending
                        )
                    )
                  LoadingSpinnerColor: =RGBA(123, 94, 87, 1)
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderAs.Height,
                        SearchContainerAs.Height,
                        50
                    )
                Children:
                  - BackgroundAs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(244,240,234,1)
                        Height: =120
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =ThisItem.IsSelected
                        Width: =Parent.Width
                  - DividingLineAs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(106, 122, 127, 1)
                        Height: =1
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - Self.X*2
                        X: =40
                        Y: =120
                  - AccountLabel:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =110
                        OnSelect: =
                        PaddingBottom: =20
                        PaddingLeft: =150
                        PaddingRight: =Parent.Width/3 + 20
                        PaddingTop: =20
                        Text: =ThisItem.Name
                        Tooltip: =Self.Text
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                  - CurrentLabelAs:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =15
                        Italic: =true
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =50
                        PaddingTop: =0
                        Size: =10
                        Text: ="current"
                        Visible: |-
                          =And(
                              Value(ThisItem.AvailableBalance) <> Value(ThisItem.CurrentBalance),
                              Not(IsBlank(ThisItem.CurrentBalance)),
                              Not(IsBlank(ThisItem.AvailableBalance)),
                              ThisItem.Type <> "credit",
                              ThisItem.IsSelected
                          )
                        Width: =Parent.Width - Parent.TemplatePadding*2
                        Y: =100
                  - CurrentBalanceLabelAs:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =50
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =Parent.Width/2 + 20
                        PaddingRight: =50
                        PaddingTop: =0
                        Size: =20
                        Text: |-
                          =Text(
                              If(
                                  RandBetween(
                                      0,
                                      1
                                  ) = 1,
                                  ThisItem.CurrentBalance * If(
                                      gvarDemoMode,
                                      Rand(),
                                      1
                                  ),
                                  ThisItem.CurrentBalance / If(
                                      gvarDemoMode,
                                      Rand(),
                                      1
                                  )
                              ),
                              "#,##0.00"
                          )
                        Tooltip: =Self.Text
                        Visible: |-
                          =And(
                              Value(ThisItem.AvailableBalance) <> Value(ThisItem.CurrentBalance),
                              Not(IsBlank(ThisItem.CurrentBalance)),
                              Not(IsBlank(ThisItem.AvailableBalance)),
                              ThisItem.Type <> "credit"
                          )
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: =60
                  - AvailableLabelAs:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        Height: =15
                        Italic: =true
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =50
                        PaddingTop: =0
                        Size: =10
                        Text: ="available"
                        Visible: |-
                          =And(
                              Value(ThisItem.AvailableBalance) <> Value(ThisItem.CurrentBalance),
                              Not(IsBlank(ThisItem.CurrentBalance)),
                              Not(IsBlank(ThisItem.AvailableBalance)),
                              ThisItem.Type <> "credit",
                              ThisItem.IsSelected
                          )
                        Width: =Parent.Width - Parent.TemplatePadding*2
                        Y: =50
                  - AvailableBalanceLabelAs:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: |-
                          =If(
                              If(
                                  ThisItem.Type = "credit",
                                  ThisItem.CurrentBalance * -1,
                                  ThisItem.AvailableBalance
                              ) < 0,
                              RGBA(
                                  161,
                                  78,
                                  58,
                                  1
                              ),
                              RGBA(
                                  122,
                                  139,
                                  117,
                                  1
                              )
                          )
                        Font: =Font.'Open Sans'
                        Height: =50
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =Parent.Width/2 + 20
                        PaddingRight: =50
                        PaddingTop: =0
                        Size: =20
                        Text: |-
                          =If(
                              And(
                                  Value(ThisItem.AvailableBalance) <> Value(ThisItem.CurrentBalance),
                                  Not(IsBlank(ThisItem.CurrentBalance)),
                                  Not(IsBlank(ThisItem.AvailableBalance)),
                                  ThisItem.Type <> "credit"
                              ),
                              Concatenate(
                                  If(
                                      gvarShowCurrencySymbol,
                                      Concatenate(
                                          LookUp(
                                              colCurrencies,
                                              ThisItem.CurrencyCode in codes
                                          ).symbol,
                                          " "
                                      ),
                                      Blank()
                                  ),
                                  Text(
                                      If(
                                          RandBetween(
                                              0,
                                              1
                                          ) = 1,
                                          Coalesce(
                                              ThisItem.AvailableBalance,
                                              ThisItem.CurrentBalance
                                          ) * If(
                                              gvarDemoMode,
                                              Rand(),
                                              1
                                          ),
                                          Coalesce(
                                              ThisItem.AvailableBalance,
                                              ThisItem.CurrentBalance
                                          ) / If(
                                              gvarDemoMode,
                                              Rand(),
                                              1
                                          )
                                      ),
                                      "#,##0.00"
                                  )
                              ),
                              Concatenate(
                                  If(
                                      gvarShowCurrencySymbol,
                                      Concatenate(
                                          LookUp(
                                              colCurrencies,
                                              ThisItem.CurrencyCode in codes
                                          ).symbol,
                                          " "
                                      ),
                                      Blank()
                                  ),
                                  Text(
                                      If(
                                          RandBetween(
                                              0,
                                              1
                                          ) = 1,
                                          If(
                                              ThisItem.Type = "credit",
                                              ThisItem.CurrentBalance * -1,
                                              Coalesce(
                                                  ThisItem.AvailableBalance,
                                                  ThisItem.CurrentBalance
                                              )
                                          ) * If(
                                              gvarDemoMode,
                                              Rand(),
                                              1
                                          ),
                                          If(
                                              ThisItem.Type = "credit",
                                              ThisItem.CurrentBalance * -1,
                                              Coalesce(
                                                  ThisItem.AvailableBalance,
                                                  ThisItem.CurrentBalance
                                              )
                                          ) / If(
                                              gvarDemoMode,
                                              Rand(),
                                              1
                                          )
                                      ),
                                      "#,##0.00"
                                  )
                              )
                          )
                        Tooltip: =Self.Text
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: |-
                          =If(
                              And(
                                  Value(ThisItem.AvailableBalance) <> Value(ThisItem.CurrentBalance),
                                  Not(IsBlank(ThisItem.CurrentBalance)),
                                  Not(IsBlank(ThisItem.AvailableBalance)),
                                  ThisItem.Type <> "credit"
                              ),
                              10,
                              35
                          )
                  - AccountSubtypeLabel:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =50
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =150
                        PaddingRight: =Parent.Width/3 + 20
                        PaddingTop: =0
                        Size: =18
                        Text: |-
                          =If(
                              Or(
                                  Lower(ThisItem.Subtype) = "ira",
                                  Lower(ThisItem.Subtype) = "cd",
                                  Lower(ThisItem.Subtype) = "hsa"
                              ),
                              Upper(ThisItem.Subtype),
                              Proper(ThisItem.Subtype)
                          )
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: |+
                          =60
                  - InstututionLogoContainerAs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Height: =80
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =80
                        X: =50
                        Y: =20
                      Children:
                        - InstitutionLogoAs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisplayMode: =DisplayMode.View
                              Fill: |-
                                =If(
                                    IsBlank(ThisItem.AccessToken.Institution.Logo),
                                    ColorValue(ThisItem.AccessToken.Institution.PrimaryColor)
                                )
                              Height: |-
                                =If(
                                    ThisItem.Status = 'Status (BankAccounts)'.Inactive,
                                    60,
                                    80
                                )
                              Image: |-
                                =Coalesce(
                                    ThisItem.AccessToken.Institution.Logo,
                                    account_balance_500dp_FFFFFF_FILL0_wght500_GRAD0_opsz48
                                )
                              PaddingBottom: |-
                                =If(
                                    IsBlank(ThisItem.AccessToken.Institution.Logo),
                                    Self.Height * .19,
                                    0
                                )
                              PaddingLeft: |-
                                =If(
                                    IsBlank(ThisItem.AccessToken.Institution.Logo),
                                    Self.Height * .19,
                                    0
                                )
                              PaddingRight: |-
                                =If(
                                    IsBlank(ThisItem.AccessToken.Institution.Logo),
                                    Self.Height * .19,
                                    0
                                )
                              PaddingTop: |-
                                =If(
                                    IsBlank(ThisItem.AccessToken.Institution.Logo),
                                    Self.Height * .19,
                                    0
                                )
                              RadiusBottomLeft: =Self.Height/2
                              RadiusBottomRight: =Self.Height/2
                              RadiusTopLeft: =Self.Height/2
                              RadiusTopRight: =Self.Height/2
                              Width: |-
                                =If(
                                    ThisItem.Status = 'Status (BankAccounts)'.Inactive,
                                    60,
                                    80
                                )
                        - DisconnectIcon:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisplayMode: =DisplayMode.View
                              Height: =40
                              Image: =power_off_500dp_A14E3A_FILL0_wght500_GRAD0_opsz48
                              Tooltip: ="Disconnected"
                              Visible: =ThisItem.Status = 'Status (BankAccounts)'.Inactive
                              Width: =40
                              X: =40
                              Y: =40
            - NoItemsLabelAs:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.Height - Self.Y
                  PaddingBottom: =0
                  PaddingLeft: =50
                  PaddingRight: =50
                  PaddingTop: =40
                  Text: ="No accounts found"
                  VerticalAlign: =VerticalAlign.Top
                  Visible: =AccountsGallery.AllItemsCount = 0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        SearchContainerAs.Height,
                        SearchContainerAs.Y,
                        25
                    )
            - ActionContainerAs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width - Self.X*2
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainer2:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIcon2:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Concurrent(
                                    Reset(SearchInputAs),
                                    Reset(AccountsGallery)
                                );
                                Back(ScreenTransition.Fade)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - TransactionsContainer2:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - TransactionsIcon2:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    Not(IsBlank(AccountsGallery.Selected)),
                                    DisplayMode.Edit,
                                    DisplayMode.Disabled
                                )
                              Height: =Parent.Height
                              Image: =wallet_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Concurrent(
                                    Reset(CategoriesGalleryCs),
                                    Reset(SearchInputCs),
                                    Set(
                                        gvarTransactionsFilter,
                                        {
                                            Visible: false,
                                            Applied: true,
                                            PendingChecked: false,
                                            DateChecked: false,
                                            AmountChecked: false,
                                            AccountChecked: true,
                                            CategoriesChecked: false,
                                            SplitsChecked: false,
                                            Pending: [
                                                true,
                                                false
                                            ],
                                            Accounts: [AccountsGallery.Selected],
                                            FirstAmount: -999999999999,
                                            SecondAmount: 999999999999,
                                            FirstDate: Date(
                                                2019,
                                                12,
                                                31
                                            ),
                                            //This is an arbitrary date. Assuming no transactions will be before this date.
                                            SecondDate: Today() + 1,
                                            //Assuming that there won't be transactions for the future.
                                            Categories: Blank(),
                                            Splits: [
                                                true,
                                                false
                                            ]
                                        }
                                    )
                                );
                                Navigate(
                                    TransactionsScreen,
                                    ScreenTransition.Fade
                                )
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Transactions"
                              Width: =Parent.Width
            - ScreenHeaderAs:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Fill: =RGBA(123, 94, 87, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =Self.Height/3
                  Text: ="Accounts"
                  Width: =Parent.Width
            - RiataLogoAs:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  Image: ='Riata Hat'
                  OnSelect: |-
                    =Concurrent(
                        Reset(SearchInputAs),
                        Reset(AccountsGallery)
                    );
                    Navigate(
                        HomeScreen,
                        ScreenTransition.Fade
                    )
                  Tooltip: ="Home"
                  Width: =Self.Height*1.5
            - FilterIconAs:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Color: =RGBA(123, 94, 87, 1)
                  FocusedBorderThickness: =0
                  Height: =Min(Parent.Width/12,75)
                  HoverBorderColor: =Self.BorderColor
                  HoverColor: =Self.Color
                  Icon: |-
                    =If(
                        gvarAccountsFilter.Applied,
                        Icon.FilterFlatFilled,
                        Icon.FilterFlat
                    )
                  OnSelect: |-
                    =Set(
                        gvarAccountsFilter,
                        {
                            Visible: true,
                            Applied: gvarAccountsFilter.Applied,
                            AccessTokenChecked: gvarAccountsFilter.AccessTokenChecked,
                            AccessTokens: gvarAccountsFilter.AccessTokens
                        }
                    )
                  PaddingBottom: =10
                  PaddingTop: =10
                  Tooltip: ="Filter"
                  Width: =Min(Parent.Width/12,75)
                  X: =Sum(Parent.Width, -Self.Width, -50 )
                  Y: |-
                    =Sum(
                        ScreenHeaderAs.Height,
                        25
                    )
            - SearchContainerAs:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderThickness: =1
                  DropShadow: =DropShadow.Regular
                  Height: =Min(Parent.Width/12,75)
                  RadiusBottomLeft: =25
                  RadiusBottomRight: =25
                  RadiusTopLeft: =25
                  RadiusTopRight: =25
                  Width: =Sum(Parent.Width, -Self.X*2, -FilterIconAs.Width, -30)
                  X: =50
                  Y: |-
                    =Sum(
                        ScreenHeaderAs.Height,
                        25
                    )
                Children:
                  - SearchInputAs:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        BorderThickness: =0
                        Clear: =true
                        Default: =
                        DelayOutput: =true
                        EnableSpellCheck: =true
                        Fill: =RGBA(0, 0, 0, 0)
                        Font: =Font.'Open Sans'
                        Height: =Parent.Height
                        HintText: ="Search"
                        HoverBorderColor: =Self.BorderColor
                        HoverColor: =Self.Color
                        HoverFill: =Self.Fill
                        PaddingBottom: =0
                        PaddingLeft: =10
                        PaddingRight: =25
                        PaddingTop: =0
                        RadiusTopLeft: =0
                        Size: =Self.Height/3
                        Width: =Sum(Parent.Width, -Self.X, -20)
                        X: =SearchIconAs.X + SearchIconAs.Width
                  - SearchIconAs:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        Color: =RGBA(79, 90, 94, 1)
                        DisplayMode: =DisplayMode.View
                        FocusedBorderThickness: =0
                        Height: =Parent.Height
                        HoverBorderColor: =Self.BorderColor
                        HoverColor: =Self.Color
                        Icon: =Icon.Search
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        PaddingTop: =10
                        Width: =Parent.Height
                        X: =10
            - FilterContainer2:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =Self.Fill
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(224, 224, 224, 0.9)
                  Height: =Parent.Height
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gvarAccountsFilter.Visible
                  Width: =Parent.Width
                Children:
                  - FilterModal2:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(139, 154, 159, 1)
                        BorderThickness: =2
                        DropShadow: =DropShadow.ExtraBold
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =400
                        RadiusBottomLeft: =40
                        RadiusBottomRight: =40
                        RadiusTopLeft: =40
                        RadiusTopRight: =40
                        Width: =Min(Sum(Parent.Width, - 80), 600)
                        X: =Parent.Width/2 - Self.Width/2
                        Y: =Parent.Height/2 - Self.Height/2
                      Children:
                        - ClearFilterButton2:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =Self.Color
                              BorderThickness: =5
                              Color: =RGBA(161, 78, 58, 1)
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              OnSelect: |-
                                =Concurrent(
                                    Set(
                                        gvarAccountsFilter,
                                        {
                                            Visible: false,
                                            Applied: false
                                        }
                                    ),
                                    UpdateContext(
                                        {
                                            varReset: true,
                                            varAccessTokenError: false
                                        }
                                    )
                                );
                                UpdateContext({varReset: false})
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =Self.Fill
                              PressedFill: =Self.Color
                              RadiusBottomLeft: =30
                              RadiusBottomRight: =30
                              RadiusTopLeft: =30
                              RadiusTopRight: =30
                              Text: ="Clear"
                              Width: =Parent.Width/3
                              X: =Parent.Width/9
                              Y: =Parent.Height - Self.Height - Parent.Width/9
                        - ApplyFilterButton2:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =Self.Fill
                              BorderThickness: =5
                              Color: =RGBA(255, 255, 255, 1)
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =RGBA(123, 94, 87, 1)
                              Font: =Font.'Open Sans'
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varAccessTokenError: And(
                                            AccessTokenFilterCheckbox2.Value,
                                            Or(
                                                IsEmpty(AccessTokenFilterInput2.SelectedItems),
                                                IsBlank(AccessTokenFilterInput2.SelectedItems)
                                            )
                                        )
                                    }
                                );
                                If(
                                    varAccessTokenError,
                                    Notify(
                                        "Select an institution before applying the filter",
                                        NotificationType.Warning
                                    ),
                                    AccessTokenFilterCheckbox2.Value,
                                    Set(
                                        gvarAccountsFilter,
                                        {
                                            Visible: false,
                                            Applied: true,
                                            AccessTokenChecked: AccessTokenFilterCheckbox2.Value,
                                            AccessTokens: AccessTokenFilterInput2.SelectedItems
                                        }
                                    ),
                                    Select(ClearFilterButton2)
                                )
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =Self.Fill
                              PressedFill: =Self.Color
                              RadiusBottomLeft: =30
                              RadiusBottomRight: =30
                              RadiusTopLeft: =30
                              RadiusTopRight: =30
                              Text: ="Apply"
                              Width: =Parent.Width/3
                              X: =Parent.Width - Self.Width - Parent.Width/9
                              Y: =Parent.Height - Self.Height - Parent.Width/9
                        - CancelFilterIcon2:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              Color: =RGBA(161, 78, 58, 1)
                              FocusedBorderThickness: =0
                              Height: =80
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              Icon: =Icon.CancelBadge
                              OnSelect: |-
                                =Concurrent(
                                    Set(
                                        gvarAccountsFilter,
                                        {
                                            Visible: false,
                                            Applied: gvarAccountsFilter.Applied,
                                            AccessTokenChecked: gvarAccountsFilter.AccessTokenChecked,
                                            AccessTokens: gvarAccountsFilter.AccessTokens
                                        }
                                    ),
                                    UpdateContext({varAccessTokenError: false})
                                )
                              PaddingBottom: =10
                              PaddingLeft: =10
                              PaddingRight: =20
                              PaddingTop: =20
                              Width: =80
                              X: =Sum(Parent.Width, -Self.Width)
                        - AccessTokenFilterInput2:
                            Control: Classic/ComboBox@2.4.0
                            Properties:
                              BorderColor: |-
                                =If(
                                    And(
                                        varAccessTokenError,
                                        Or(
                                            IsEmpty(Self.SelectedItems),
                                            IsBlank(Self.SelectedItems)
                                        )
                                    ),
                                    RGBA(
                                        212,
                                        159,
                                        0,
                                        1
                                    ),
                                    RGBA(
                                        166,
                                        166,
                                        166,
                                        1
                                    )
                                )
                              ChevronBackground: =RGBA(0, 0, 0, 0)
                              ChevronFill: =RGBA(0, 0, 0, 0)
                              ChevronHoverBackground: =Self.ChevronBackground
                              ChevronHoverFill: =RGBA(255, 255, 255, 1)
                              DefaultSelectedItems: |-
                                =If(
                                    gvarAccountsFilter.AccessTokenChecked,
                                    gvarAccountsFilter.AccessTokens
                                )
                              DisplayFields: =["mda_institutionname2"]
                              FocusedBorderThickness: =Self.BorderThickness
                              Font: =Font.'Open Sans'
                              Height: =60
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              IsSearchable: =false
                              Items: |-
                                =Sort(
                                    Filter(
                                        AccessTokens,
                                        Profile.Guid = gvarSelectedRole.Profile.Guid
                                    ),
                                    Institution.Name,//making a safe assumption that a profile won't have more institutions than the delegable limit. The filter function is still delegated.
                                    SortOrder.Ascending
                                )
                              PressedColor: =Self.Color
                              PressedFill: =Self.Fill
                              Reset: =varReset
                              SearchFields: =["mda_institutionname2"]
                              SelectionColor: =Self.HoverColor
                              SelectionFill: =Self.HoverFill
                              Width: =430
                              X: =90
                              Y: =140
                        - AccessTokenFilterCheckbox2:
                            Control: Classic/CheckBox@2.1.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              CheckboxBorderColor: =RGBA(79, 90, 94, 1)
                              CheckboxSize: =50
                              CheckmarkFill: =RGBA(123, 94, 87, 1)
                              Default: =gvarAccountsFilter.AccessTokenChecked
                              FocusedBorderThickness: =Self.BorderThickness
                              Font: =Font.'Open Sans'
                              Height: =60
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              OnSelect: =
                              PaddingLeft: =20
                              PressedBorderColor: =Self.BorderColor
                              PressedFill: =Self.Fill
                              Reset: =varReset
                              Text: =
                              Width: =90
                              Y: =80
                        - AccessTokenFilterLabel2:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Lighter
                              Height: =60
                              Size: =20
                              Text: ="Institutions"
                              Width: =Parent.Width - Self.X*2
                              X: =90
                              Y: =80

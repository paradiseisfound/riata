                                                        PlaidAccessStatus <> "USER_PERMISSION_REVOKED",
                                                        PlaidAccessStatus <> "ITEM_LOGIN_REQUIRED"
                                                    ),
                                                    PlaidItemId
                                                )
                                            }
                                        ),
                                        {text_1: User().EntraObjectId}
                                    ),
                                    Notify(
                                        "There was an error syncing transactions.",
                                        NotificationType.Error
                                    ),
                                    Notify(
                                        "You'll get a notification when the sync is complete.",
                                        NotificationType.Success
                                    )

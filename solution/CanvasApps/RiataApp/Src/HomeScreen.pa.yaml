    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(
            gvarShowCurrencySymbol,
            CountRows(
                Distinct(
                    Filter(
                        BankAccounts,
                        AccessToken.Profile.Guid = gvarProfile.Guid

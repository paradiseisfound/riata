                                        ),
                                        Notify(
                                            "Institution refresh initiated.",
                                            NotificationType.Success
                                        )
                                    ),
                                    IfError(
                                        CalculateBudgets.Run({text: User().EntraObjectId}),
                                        Notify(
                                            "There was an error extending recurring budget entries.",
                                            NotificationType.Error
                                        ),
                                        Notify(
                                            "Extending recurring budget entries.",
                                            NotificationType.Success
                                        )
                                    ),
                                    IfError(
                                        AttachmentsCleanup.Run({text: User().EntraObjectId}),
                                        Notify(
                                            "There was an error cleaning up files.",
                                            NotificationType.Error
                                        ),
                                        Notify(
                                            "Cleaning up files.",

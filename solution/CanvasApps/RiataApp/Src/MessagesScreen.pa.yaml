                  RadiusBottomLeft: =25
                  RadiusBottomRight: =25
                  RadiusTopLeft: =25
                  RadiusTopRight: =25
                  Width: =Sum(Parent.Width, -Self.X*2, -FilterIconMs.Width, -30)

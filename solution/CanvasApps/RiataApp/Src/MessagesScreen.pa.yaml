Screens:
  MessagesScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Refresh(Messages)
      Width: =App.Width
    Children:
      - ContainerMs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - MessagesGallery:
                Control: Gallery@2.15.0
                Variant: VariableHeight
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Default: ={}
                  Height: |-
                    =Sum(
                        Parent.Height,
                        -Self.Y,
                        -ActionContainerMs.Height
                    )
                  Items: |-
                    =If(
                        varFilter.Applied,
                        Sort(
                            Search(
                                Filter(
                                    Messages,
                                    'Created On' >= varFilter.FirstDate,
                                    'Created On' <= DateAdd(
                                        varFilter.SecondDate,
                                        1,
                                        TimeUnit.Days
                                    ),
                                    Type in varFilter.Types,
                                    Status in varFilter.MessageRead,
                                    Profile.Guid = gvarProfile.Guid
                                ),
                                TrimEnds(SearchInputMs.Text),
                                Title,
                                Description
                            ),
                            'Created On',
                            SortOrder.Descending
                        ),
                        Sort(
                            Search(
                                Filter(
                                    Messages,
                                    Profile.Guid = gvarProfile.Guid
                                ),
                                TrimEnds(SearchInputMs.Text),
                                Title,
                                Description
                            ),
                            'Created On',
                            SortOrder.Descending
                        )
                    )
                  LoadingSpinnerColor: =RGBA(123, 94, 87, 1)
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderMs.Height,
                        SearchContainerMs.Height,
                        50
                    )
                Children:
                  - BackgroundMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(244,240,234,1)
                        Height: =120
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =ThisItem.IsSelected
                        Width: =Parent.Width
                  - DividingLineMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(106, 122, 127, 1)
                        Height: =1
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - Self.X*2
                        X: =40
                        Y: =120
                  - MessageImageMs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DisplayMode: =DisplayMode.View
                        Fill: |-
                          =Switch(
                              ThisItem.Type,
                              'Type (Messages)'.Export,
                              RGBA(
                                  74,
                                  101,
                                  114,
                                  1
                              ),
                              'Type (Messages)'.Error,
                              RGBA(
                                  161,
                                  78,
                                  58,
                                  1
                              ),
                              'Type (Messages)'.Information,
                              RGBA(
                                  183,
                                  159,
                                  144,
                                  1
                              )
                          )
                        Height: =80
                        Image: |-
                          =Switch(
                              ThisItem.Type,
                              'Type (Messages)'.Export,
                              draft_500dp_FFFFFF_FILL0_wght500_GRAD0_opsz48,
                              'Type (Messages)'.Error,
                              warning_500dp_FFFFFF_FILL0_wght500_GRAD0_opsz48,
                              'Type (Messages)'.Information,
                              info_i_500dp_FFFFFF_FILL0_wght500_GRAD0_opsz48
                          )
                        OnSelect: =Select(Parent)
                        PaddingBottom: =15
                        PaddingLeft: =15
                        PaddingRight: =15
                        PaddingTop: =15
                        RadiusBottomLeft: =Self.Height/2
                        RadiusBottomRight: =Self.Height/2
                        RadiusTopLeft: =Self.Height/2
                        RadiusTopRight: =Self.Height/2
                        Width: =80
                        X: =50
                        Y: =20
                  - NewMessageLabel:
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =Align.Right
                        Appearance: =ButtonAppearance.Transparent
                        DisplayMode: =DisplayMode.View
                        FontWeight: =FontWeight.Normal
                        Height: =50
                        Icon: ="Star"
                        IconStyle: =IconStyle.Filled
                        Italic: =true
                        Layout: =ButtonLayout.IconAfter
                        OnSelect: =Select(Parent)
                        Text: ="New"
                        Visible: =ThisItem.Status = 'Status (Messages)'.Active
                        Width: =150
                        X: =Parent.Width - Self.Width - 40
                        Y: =60
                  - CreatedOnLabelMs:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =50
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =150
                        PaddingRight: =20
                        PaddingTop: =0
                        Size: =18
                        Text: =ThisItem.'Created On'
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: |+
                          =60
                  - MessageTitleMs:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: |-
                          =If(
                              ThisItem.Status = 'Status (Messages)'.Active,
                              FontWeight.Semibold,
                              FontWeight.Normal
                          )
                        Height: =110
                        OnSelect: =
                        PaddingBottom: =20
                        PaddingLeft: =150
                        PaddingRight: =20
                        PaddingTop: =20
                        Text: =ThisItem.Title
                        Tooltip: =Self.Text
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
            - NoItemsLabelMs:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.Height - Self.Y
                  PaddingBottom: =0
                  PaddingLeft: =50
                  PaddingRight: =50
                  PaddingTop: =40
                  Text: ="No messages found"
                  VerticalAlign: =VerticalAlign.Top
                  Visible: =MessagesGallery.AllItemsCount = 0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        SearchContainerMs.Height,
                        SearchContainerMs.Y,
                        25
                    )
            - ActionContainerMs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width - Self.X*2
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIconMs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Concurrent(
                                    Reset(SearchInputMs),
                                    Reset(MessagesGallery)
                                );
                                Back(ScreenTransition.Fade)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - RefreshContainerMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - RefreshIconMs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =refresh_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =IfError(
                                    Refresh(Messages),
                                    Notify(
                                        "There was an error refreshing messages.",
                                        NotificationType.Error
                                    ),
                                    Notify(
                                        "Messages refreshed.",
                                        NotificationType.Success
                                    )
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Refresh"
                              Width: =Parent.Width
                  - ReadUnreadContainerMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - ReadUnreadMessageIconMs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(MessagesGallery.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: |-
                                =If(
                                    MessagesGallery.Selected.Status = 'Status (Messages)'.Inactive,
                                    mark_email_unread_500dp_4A6572_FILL0_wght500_GRAD0_opsz48,
                                    mark_email_read_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                                )
                              OnSelect: |-
                                =Patch(
                                    Messages,
                                    MessagesGallery.Selected,
                                    {
                                        Status: If(
                                            MessagesGallery.Selected.Status = 'Status (Messages)'.Active,
                                            'Status (Messages)'.Inactive,
                                            'Status (Messages)'.Active
                                        )
                                    }
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Refresh"
                              Width: =Parent.Width
                  - OpenMessageContainerMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - OpenMessageIconMs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(MessagesGallery.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =drafts_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext({varMessage: MessagesGallery.Selected})
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Refresh"
                              Width: =Parent.Width
                  - DeleteConatinerMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(161, 78, 58, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - DeleteIconMs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: |-
                                =RGBA(
                                        224,
                                        224,
                                        224,
                                        1
                                    )
                              DisplayMode: |-
                                =If(
                                    IsBlank(MessagesGallery.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =delete_500dp_A14E3A_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext({varDeleteMessage: MessagesGallery.Selected})
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: =
                              Width: =Parent.Width
            - FilterIconMs:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Color: =RGBA(123, 94, 87, 1)
                  FocusedBorderThickness: =0
                  Height: =Min(Parent.Width/12,75)
                  HoverBorderColor: =Self.BorderColor
                  HoverColor: =Self.Color
                  Icon: |-
                    =If(
                        varFilter.Applied,
                        Icon.FilterFlatFilled,
                        Icon.FilterFlat
                    )
                  OnSelect: |-
                    =UpdateContext(
                        {
                            varFilter: {
                                Visible: true,
                                Applied: varFilter.Applied,
                                DateChecked: varFilter.DateChecked,
                                FirstDate: varFilter.FirstDate,
                                SecondDate: varFilter.SecondDate,
                                TypeChecked: varFilter.TypeChecked,
                                Types: varFilter.Types,
                                ReadChecked: varFilter.ReadChecked,
                                MessageRead: varFilter.MessageRead
                            },
                            varFilterType: {
                                Date: Coalesce(
                                    varFilterType.Date,
                                    "Equal To"
                                )
                            }
                        }
                    )
                  PaddingBottom: =10
                  PaddingTop: =10
                  Tooltip: ="Filter"
                  Width: =Min(Parent.Width/12,75)
                  X: =Sum(Parent.Width, -Self.Width, -50 )
                  Y: |-
                    =Sum(
                        ScreenHeaderMs.Height,
                        25
                    )
            - ScreenHeaderMs:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Fill: =RGBA(123, 94, 87, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =Self.Height/3
                  Text: ="Messages"
                  Width: =Parent.Width
            - RiataLogoMs:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )

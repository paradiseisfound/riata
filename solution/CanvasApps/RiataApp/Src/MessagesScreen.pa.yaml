                                    BorderStyle: =BorderStyle.None
                                    Default: |-
                                      =If(
                                          varFilterType.Field = "Date",
                                          {Value: varFilterType.Date},
                                          {Value: varFilterType.Amount}
                                      )
                                    Height: =Self.TemplateHeight*4
                                    Items: |-
                                      =Sort(
                                          [
                                              "Greater Than or Equal",
                                              "Less Than or Equal",
                                              "Equal To",
                                              "Between"
                                          ],
                                          Value,
                                          SortOrder.Ascending
                                      )
                                    ShowScrollbar: =false
                                    TemplatePadding: =0
                                    TemplateSize: =125
                                    Width: |-
                                      =Min(
                                          Parent.Width,
                                          500
                                      )
                                    WrapCount: =0
                                    X: =Parent.Width / 2 - Self.Width/2
                                    Y: =Parent.Height /2 - Self.Height /2
                                  Children:
                                    - FilterTypeContainerMs:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          BorderColor: =RGBA(79, 90, 94, 1)
                                          BorderThickness: =1
                                          DropShadow: =DropShadow.Regular
                                          Fill: |-
                                            =If(
                                                ThisItem.IsSelected,
                                                RGBA(
                                                    244,
                                                    240,
                                                    234,
                                                    1
                                                ),
                                                RGBA(
                                                    0,
                                                    0,
                                                    0,
                                                    0
                                                )
                                            )
                                          Height: =Parent.TemplateHeight - Self.Y*2
                                          RadiusBottomLeft: =20
                                          RadiusBottomRight: =20
                                          RadiusTopLeft: =20
                                          RadiusTopRight: =20
                                          Width: =Parent.Width - Self.X*2
                                          X: =25
                                          Y: =25
                                        Children:
                                          - FilterTypeLabelMs:
                                              Control: Label@2.5.1
                                              Properties:
                                                Align: =Align.Center
                                                BorderColor: =RGBA(0, 0, 0, 0)
                                                Font: =Font.'Open Sans'
                                                Height: =Parent.Height
                                                OnSelect: |-
                                                  =UpdateContext(
                                                      {
                                                          varFilterType: {
                                                              Field: Blank(),
                                                              Date: If(
                                                                  varFilterType.Field = "Date",
                                                                  ThisItem.Value,
                                                                  varFilterType.Date
                                                              ),
                                                              Amount: If(
                                                                  varFilterType.Field = "Amount",
                                                                  ThisItem.Value,
                                                                  varFilterType.Amount
                                                              )
                                                          }
                                                      }
                                                  )
                                                PaddingBottom: =0
                                                PaddingLeft: =0
                                                PaddingRight: =0
                                                PaddingTop: =0
                                                Text: =ThisItem.Value
                                                Width: =Parent.Width

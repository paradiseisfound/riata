                  Height: =Parent.Height
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: |-
                    =Or(
                        Not(IsBlank(varMessage)),
                        Not(IsBlank(varDeleteMessage))
                    )
                  Width: =Parent.Width
                Children:
                  - ModalMs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(139, 154, 159, 1)

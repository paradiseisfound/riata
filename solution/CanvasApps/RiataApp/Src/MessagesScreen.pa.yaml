                  OnSelect: |-
                    =Concurrent(
                        Reset(SearchInputMs),
                        Reset(MessagesGallery),
                        Select(ClearFilterButtonMs)
                    );
                    Navigate(
                        HomeScreen,
                        ScreenTransition.Fade
                    )
                  Tooltip: ="Home"
                  Width: =Self.Height*1.5
            - SearchContainerMs:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderThickness: =1

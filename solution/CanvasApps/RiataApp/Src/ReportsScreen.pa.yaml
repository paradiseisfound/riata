                                  ),
                                  varBeginDate: Min(
                                      Self.SelectedDate,
                                      DisplayEndDateRs.SelectedDate
                                  )
                              }
                          )
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        Reset: =
                        Size: =Self.Height/3.75

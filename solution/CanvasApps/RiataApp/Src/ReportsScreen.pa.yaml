Screens:
  ReportsScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =IfError(
            If(
                IsEmpty(colReport),
                UpdateContext({varSpinner: {generating: true}});
                ClearCollect(
                    colReport,
                    ForAll(
                        ParseJSON(
                            GenerateReport.Run(
                                Text(
                                    Date(
                                        Year(Today()),
                                        Month(Today()),
                                        1
                                    ),
                                    "yyyy-mm-dd"
                                ),
                                Text(
                                    EOMonth(
                                        Today(),
                                        0
                                    ),
                                    "yyyy-mm-dd"
                                ),
                                gvarSelectedRole.Profile.Guid
                            ).reportarray
                        ),
                        {
                            Name: Text(ThisRecord.mda_name),
                            Type: If(
                                Value(ThisRecord.mda_type) = 0,
                                3,
                                Value(ThisRecord.mda_type)
                            ),
                            Index: Value(ThisRecord.mda_index),
                            Depth: Value(ThisRecord.mda_depth),
                            Color: Text(ThisRecord.mda_color),
                            BudgetAmount: Value(ThisRecord.budgetAmount),
                            TransactionAmount: Value(ThisRecord.transactionAmount),
                            ActualMinBudgetAmount: Value(ThisRecord.transactionAmount) - Value(ThisRecord.budgetAmount)
                        }
                    )
                )
            ),
            Back(ScreenTransition.Fade);
            Notify(
                "There was an error generating the report.",
                NotificationType.Error
            )
        );
        UpdateContext({varSpinner: Blank()})
      Width: =App.Width
    Children:
      - ContainerRs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - ActionContainerRs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerRs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIconRs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: =Back(ScreenTransition.Fade)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - VisibleContainerRs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - VisibleIconRs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =view_column_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =ClearCollect(
                                    colReportDisplay,
                                    {
                                        NumColumns: If(
                                            First(colReportDisplay).NumColumns = 1,
                                            3,
                                            First(colReportDisplay).NumColumns - 1
                                        ),
                                        ColumnOrder: First(colReportDisplay).ColumnOrder
                                    }
                                );
                                SaveData(
                                    colReportDisplay,
                                    "colReportDisplay"
                                )
                              PaddingBottom: =Parent.Height/12
                              PaddingLeft: =Parent.Height/12
                              PaddingRight: =Parent.Height/12
                              PaddingTop: =Parent.Height/12
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Columns"
                              Width: =Parent.Width
                  - ShuffleContainerRs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - ShuffleIconRs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =shuffle_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =ClearCollect(
                                    colReportDisplay,
                                    {
                                        NumColumns: First(colReportDisplay).NumColumns,
                                        ColumnOrder: LookUp(
                                            [
                                                {
                                                    Index: 1,
                                                    Value: [
                                                        "Budget",
                                                        "Actual",
                                                        "Act. - Bud."
                                                    ]
                                                },
                                                {
                                                    Index: 2,
                                                    Value: [
                                                        "Budget",
                                                        "Act. - Bud.",
                                                        "Actual"
                                                    ]
                                                },
                                                {
                                                    Index: 3,
                                                    Value: [
                                                        "Actual",
                                                        "Act. - Bud.",
                                                        "Budget"
                                                    ]
                                                },
                                                {
                                                    Index: 4,
                                                    Value: [
                                                        "Actual",
                                                        "Budget",
                                                        "Act. - Bud."
                                                    ]
                                                },
                                                {
                                                    Index: 5,
                                                    Value: [
                                                        "Act. - Bud.",
                                                        "Budget",
                                                        "Actual"
                                                    ]
                                                },
                                                {
                                                    Index: 6,
                                                    Value: [
                                                        "Act. - Bud.",
                                                        "Actual",
                                                        "Budget"
                                                    ]
                                                }
                                            ] As Root,
                                            Root.Index = If(
                                                First(colReportDisplay).ColumnOrder.Index = 6,
                                                1,
                                                First(colReportDisplay).ColumnOrder.Index + 1
                                            )
                                        )
                                    }
                                );
                                SaveData(
                                    colReportDisplay,
                                    "colReportDisplay"
                                )
                              PaddingBottom: =Parent.Height/12
                              PaddingLeft: =Parent.Height/12
                              PaddingRight: =Parent.Height/12
                              PaddingTop: =Parent.Height/12
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Columns"
                              Width: =Parent.Width
                  - ExportContainerRs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        Fill: |-
                          =RGBA(
                              0,
                              0,
                              0,
                              0
                          )
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - ExportIconRs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Fill: |-
                                =RGBA(
                                    0,
                                    0,
                                    0,
                                    0
                                )
                              Height: =Parent.Height
                              Image: =output_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =IfError(
                                    ExportReport.Run(
                                        JSON(colReport),
                                        gvarProfile.Guid,
                                        {text_2: User().EntraObjectId}
                                    ),
                                    Notify(
                                        "There was an error generating the export",
                                        NotificationType.Error
                                    ),
                                    Notify(
                                        "You'll get a notification when the export is ready.",
                                        NotificationType.Success
                                    )
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Export"
                              Width: =Parent.Width
                  - RefreshContainerRs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - RefreshIconRs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =refresh_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext({varSpinner: {generating: true}});
                                IfError(
                                    ClearCollect(
                                        colReport,
                                        ForAll(
                                            ParseJSON(
                                                GenerateReport.Run(
                                                    Text(
                                                        Min(
                                                            DisplayBeginDateRs.SelectedDate,
                                                            DisplayEndDateRs.SelectedDate
                                                        ),
                                                        "yyyy-mm-dd"
                                                    ),
                                                    Text(
                                                        Max(
                                                            DisplayBeginDateRs.SelectedDate,
                                                            DisplayEndDateRs.SelectedDate
                                                        ),
                                                        "yyyy-mm-dd"
                                                    ),
                                                    gvarSelectedRole.Profile.Guid
                                                ).reportarray
                                            ),
                                            {
                                                Name: Text(ThisRecord.mda_name),
                                                Type: If(
                                                    Value(ThisRecord.mda_type) = 0,
                                                    3,
                                                    Value(ThisRecord.mda_type)
                                                ),
                                                Index: Value(ThisRecord.mda_index),
                                                Depth: Value(ThisRecord.mda_depth),
                                                Color: Text(ThisRecord.mda_color),
                                                BudgetAmount: Value(ThisRecord.budgetAmount),
                                                TransactionAmount: Value(ThisRecord.transactionAmount),
                                                ActualMinBudgetAmount: Value(ThisRecord.transactionAmount) - Value(ThisRecord.budgetAmount)
                                            }
                                        )
                                    ),
                                    Notify(
                                        "There was an error generating the report.",
                                        NotificationType.Error
                                    )
                                );
                                Concurrent(
                                    Reset(DisplayBeginDateRs),
                                    Reset(DisplayEndDateRs)
                                );
                                UpdateContext({varSpinner: Blank()})
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Refresh"
                              Width: =Parent.Width
            - DisplayContainerRs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(123, 94, 87, 1)
                  BorderThickness: =Self.Height/45
                  DropShadow: =DropShadow.Semibold
                  Height: =Parent.Width / 4.75 / 2
                  LayoutAlignItems: =LayoutAlignItems.Stretch

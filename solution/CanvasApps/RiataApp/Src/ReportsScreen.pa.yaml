                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  RadiusBottomLeft: =Self.Height/3
                  RadiusBottomRight: =Self.Height/3
                  RadiusTopLeft: =Self.Height/3
                  RadiusTopRight: =Self.Height/3
                  Width: |-
                    =Min(
                        Parent.Width - 100,
                        Sum(

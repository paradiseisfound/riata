Screens:
  TransactionDetailScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      Width: =App.Width
    Children:
      - ContainerTds:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - ActionContainerTds:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerTds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIconTds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Back(ScreenTransition.Fade);
                                Concurrent(
                                    Clear(colTransactionSplits),
                                    UpdateContext(
                                        {
                                            varSplitEdit: false,
                                            varSplitAmountSumError: false
                                        }
                                    )
                                )
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - SplitContainerTds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(122, 139, 117, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - SplitIconTds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    gvarTransaction.Pending,
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =arrow_split_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =// I'm piggy-backing off the import sequence number field to temporarily, in-client, uniquely identify records when a Guid isn't available. 
                                Concurrent(
                                    If(
                                        SplitTransactionsGallery.AllItemsCount = 0,
                                        Collect(
                                            colTransactionSplits,
                                            {
                                                'Import Sequence Number': Max(
                                                    colTransactionSplits,
                                                    'Import Sequence Number'
                                                ) + 1
                                            },
                                            {
                                                'Import Sequence Number': Max(
                                                    colTransactionSplits,
                                                    'Import Sequence Number'
                                                ) + 2
                                            }
                                        ),
                                        Collect(
                                            colTransactionSplits,
                                            {
                                                'Import Sequence Number': Max(
                                                    colTransactionSplits,
                                                    'Import Sequence Number'
                                                ) + 1
                                            }
                                        )
                                    ),
                                    UpdateContext({varSplitEdit: true})
                                )
                              PaddingBottom: =Self.Width/9
                              PaddingLeft: =Self.Width/9
                              PaddingRight: =Self.Width/9
                              PaddingTop: =Self.Width/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Split"
                              Width: =Parent.Width
                  - SaveContainerTds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(122, 139, 117, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: =varSplitEdit
                        Width: =Self.Height
                      Children:
                        - SaveIconTds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =check_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varSplitAmountSumError: And(
                                            -gvarTransaction.Amount <> Coalesce(
                                                Round(
                                                    Sum(
                                                        SplitTransactionsGallery.AllItems,
                                                        Value(SplitAmountInput5.Text)
                                                    ),
                                                    2
                                                ),
                                                0
                                            ),
                                            SplitTransactionsGallery.AllItemsCount > 0
                                        )
                                    }
                                );
                                If(
                                    varSplitAmountSumError,
                                    Notify(
                                        "The sum of split amounts should equal the original transaction.",
                                        NotificationType.Warning
                                    ),
                                    IfError(
                                        ForAll(
                                            SplitTransactionsGallery.AllItems As Gallery,
                                            Patch(
                                                colTransactionSplits,
                                                Gallery,
                                                {
                                                    Description: TrimEnds(Gallery.SplitDescriptionInput5.Text),
                                                    Amount: -Value(Gallery.SplitAmountInput5.Text),
                                                    Transaction: gvarTransaction
                                                }
                                            )
                                        );
                                        Concurrent(
                                            Patch(
                                                TransactionSplits,
                                                Filter(
                                                    colTransactionSplits,
                                                    Status <> 'Status (TransactionSplits)'.Inactive,
                                                    Not(IsBlank(Amount)),
                                                    Amount <> 0
                                                )
                                            ),
                                            UpdateTransaction.Run(
                                                gvarTransaction.Guid,
                                                {
                                                    boolean: Not(
                                                        IsEmpty(
                                                            Filter(
                                                                colTransactionSplits,
                                                                Status <> 'Status (TransactionSplits)'.Inactive,
                                                                Not(IsBlank(Amount)),
                                                                Amount <> 0
                                                            )
                                                        )
                                                    ),
                                                    text_1: If(
                                                        Not(
                                                            IsEmpty(
                                                                Filter(
                                                                    colTransactionSplits,
                                                                    Status <> 'Status (TransactionSplits)'.Inactive,
                                                                    Not(IsBlank(Amount)),
                                                                    Amount <> 0
                                                                )
                                                            )
                                                        ),
                                                        "null",
                                                        Coalesce(
                                                            gvarTransaction.Category.Guid,
                                                            "null"
                                                        )
                                                    )
                                                }
                                            )
                                        );
                                        Concurrent(
                                            Remove(
                                                TransactionSplits,
                                                Filter(
                                                    colTransactionSplits,
                                                    Status = 'Status (TransactionSplits)'.Inactive,
                                                    Not(IsBlank(Guid))
                                                )
                                            ),
                                            Set(
                                                gvarTransaction,
                                                LookUp(
                                                    Transactions,
                                                    Guid = gvarTransaction.Guid
                                                )
                                            )
                                        ),
                                        Notify(
                                            "There was an error saving split amounts.",
                                            NotificationType.Error
                                        ),
                                        Concurrent(
                                            Notify(
                                                "Split amounts saved.",
                                                NotificationType.Success
                                            ),
                                            Refresh(Transactions)
                                        );
                                        Select(UndoIconTds)
                                    )
                                )
                              PaddingBottom: =Self.Width/9
                              PaddingLeft: =Self.Width/9
                              PaddingRight: =Self.Width/9
                              PaddingTop: =Self.Width/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Save"
                              Width: =Parent.Width

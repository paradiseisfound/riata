Screens:
  CategoriesScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      Width: =App.Width
    Children:
      - ContainerCs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - CategoriesGalleryCs:
                Control: Gallery@2.15.0
                Variant: VariableHeight
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Default: |-
                    =Coalesce(
                        varCategory,
                        {}
                    )
                  Height: |-
                    =Sum(
                        Parent.Height,
                        -Self.Y,
                        -ActionContainerCs.Height
                    )
                  Items: |-
                    =If(
                        varFilter.Applied,
                        Sort(
                            Search(
                                Filter(
                                    TransactionCategories,
                                    Profile.Guid = gvarSelectedRole.Profile.Guid,
                                    Type in varFilter.Type
                                ),
                                TrimEnds(SearchInputCs.Text),
                                Name
                            ),
                            Index
                        ),
                        Sort(
                            Search(
                                Filter(
                                    TransactionCategories,
                                    Profile.Guid = gvarSelectedRole.Profile.Guid
                                ),
                                TrimEnds(SearchInputCs.Text),
                                Name
                            ),
                            Index
                        )
                    )
                  LoadingSpinnerColor: =RGBA(123, 94, 87, 1)
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderCs.Height,
                        SearchContainerCs.Height,
                        50
                    )
                Children:
                  - BackgroundCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(244,240,234,1)
                        Height: =70
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =ThisItem.IsSelected
                        Width: =Parent.Width
                  - TypeLabelGalleryCs:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        BorderThickness: =0
                        Color: =RGBA(255, 255, 255, 1)
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: |-
                          =Switch(
                              ThisItem.Type,
                              TransactionTypes.'Money In',
                              RGBA(
                                  122,
                                  139,
                                  117,
                                  1
                              ),
                              TransactionTypes.'Money Out',
                              RGBA(
                                  161,
                                  78,
                                  58,
                                  1
                              ),
                              TransactionTypes.Transfer,
                              RGBA(
                                  123, 94, 87,
                                  1
                              )
                          )
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =35
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        PressedBorderColor: =Self.Fill
                        PressedColor: =Self.Fill
                        PressedFill: =Self.Color
                        RadiusBottomLeft: =20
                        RadiusBottomRight: =20
                        RadiusTopLeft: =20
                        RadiusTopRight: =20
                        Size: =15
                        Text: =ThisItem.Type
                        Width: =150
                        X: =Parent.Width - Self.Width - 35
                        Y: =17.5
                  - ParentIconCs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DisplayMode: =DisplayMode.View
                        Height: =70
                        Image: =supervisor_account_500dp_D6C2B5_FILL0_wght500_GRAD0_opsz48
                        OnSelect: =Select(Parent)
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        PaddingTop: =10
                        Visible: |-
                          =And(
                              Parent.Selected.'Parent'.Guid = ThisItem.Guid,
                              IsBlank(TrimEnds(SearchInputCs.Text))
                          )
                        Width: =70
                        X: =ThisItem.Depth*70
                  - CategoryLabelCs:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: |-
                          =If(
                              And(
                                  ThisItem.Depth = 0,
                                  IsBlank(TrimEnds(SearchInputCs.Text))
                              ),
                              FontWeight.Semibold,
                              FontWeight.Normal
                          )
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: |-
                          =(If(
                              IsBlank(TrimEnds(SearchInputCs.Text)),
                              ThisItem.Depth,
                              0
                          ) + 1) * 70
                        PaddingRight: =0
                        PaddingTop: =0
                        Text: =ThisItem.Name
                        Width: =Parent.Width
            - NoItemsLabelCs:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.Height - Self.Y
                  PaddingBottom: =0
                  PaddingLeft: =50
                  PaddingRight: =50
                  PaddingTop: =40
                  Text: ="No categories found"
                  VerticalAlign: =VerticalAlign.Top
                  Visible: =CategoriesGalleryCs.AllItemsCount = 0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderCs.Height,
                        SearchContainerCs.Height,
                        50
                    )
            - ActionContainerCs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              Not(varNewItem),
                              IsBlank(varEditItem),
                              IsBlank(varScreenReuse)
                          )
                        Width: =Self.Height
                      Children:
                        - BackIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: =Back(ScreenTransition.Fade)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - AddCategoriesContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =RGBA(
                              122,
                              139,
                              117,
                              1
                          )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              Not(varNewItem),
                              IsBlank(varEditItem),
                              IsBlank(varScreenReuse)
                          )
                        Width: =Self.Height
                      Children:
                        - AddCategoriesIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =new_label_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext({varNewItem: true})
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="New"
                              Width: =Parent.Width
                  - EditCategoriesContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =RGBA(
                              122,
                              139,
                              117,
                              1
                          )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              Not(varNewItem),
                              IsBlank(varEditItem),
                              IsBlank(varScreenReuse)
                          )
                        Width: =Self.Height
                      Children:
                        - EditCategoriesIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(CategoriesGalleryCs.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =edit_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varEditItem: LookUp(
                                            TransactionCategories,
                                            Guid = CategoriesGalleryCs.Selected.Guid
                                        )
                                    }
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Edit"
                              Width: =Parent.Width
                  - DeleteContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(161, 78, 58, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              Not(varNewItem),
                              IsBlank(varEditItem),
                              IsBlank(varScreenReuse)
                          )
                        Width: =Self.Height
                      Children:
                        - DeleteIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(CategoriesGalleryCs.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =delete_500dp_A14E3A_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varDelete: LookUp(
                                            TransactionCategories,
                                            Guid = CategoriesGalleryCs.Selected.Guid
                                        )
                                    }
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Delete"
                              Width: =Parent.Width
                  - SaveContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =RGBA(
                              122,
                              139,
                              117,
                              1
                          )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =Or(
                              varNewItem,
                              Not(IsBlank(varEditItem)),
                              Not(IsBlank(varScreenReuse))
                          )
                        Width: =Self.Height
                      Children:
                        - SaveIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =check_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =If(
                                    Not(IsBlank(varScreenReuse)),
                                    If(
                                        IsBlank(CategoriesGalleryCs.Selected),
                                        Notify(
                                            "Pick a category first.",
                                            NotificationType.Warning
                                        ),
                                        Switch(
                                            varScreenReuse,
                                            "splits",
                                            ForAll(
                                                SplitTransactionsGallery.AllItems As Gallery,
                                                Patch(
                                                    colTransactionSplits,
                                                    Gallery,
                                                    {
                                                        Description: TrimEnds(Gallery.SplitDescriptionInput5.Text),
                                                        Amount: If(
                                                            IsBlank(TrimEnds(Gallery.SplitAmountInput5.Text)),
                                                            Blank(),
                                                            -Value(Gallery.SplitAmountInput5.Text)
                                                        ),
                                                        Category: If(
                                                            Or(
                                                                And(
                                                                    Gallery.Guid = SplitTransactionsGallery.Selected.Guid,
                                                                    Not(IsBlank(Gallery.Guid))
                                                                ),
                                                                And(
                                                                    Gallery.'Import Sequence Number' = SplitTransactionsGallery.Selected.'Import Sequence Number',
                                                                    IsBlank(Gallery.Guid)
                                                                )
                                                            ),
                                                            LookUp(
                                                                TransactionCategories As LookUp,
                                                                LookUp.Guid = CategoriesGalleryCs.Selected.Guid
                                                            ),
                                                            Gallery.Category
                                                        )
                                                    }
                                                )
                                            ),
                                            "transaction",
                                            UpdateTransaction.Run(
                                                gvarTransaction.Guid,
                                                {text_1: CategoriesGalleryCs.Selected.Guid}
                                            );
                                            Refresh(Transactions);
                                            Set(
                                                gvarTransaction,
                                                LookUp(
                                                    Transactions,
                                                    Guid = gvarTransaction.Guid
                                                )
                                            ),
                                            "budget",
                                            Set(
                                                gvarBudgetCategory,
                                                LookUp(
                                                    TransactionCategories As LookUp,
                                                    LookUp.Guid = CategoriesGalleryCs.Selected.Guid
                                                )
                                            ),
                                            "transactionList",
                                            UpdateTransaction.Run(
                                                TransactionsGallery.Selected.Guid,
                                                {text_1: CategoriesGalleryCs.Selected.Guid}
                                            );
                                            Refresh(Transactions)
                                        );
                                        Select(CancelIconCs)
                                    ),
                                    If(
                                        IsBlank(TrimEnds(NameInputCs.Text)),
                                        UpdateContext({varNameError: true});
                                        Notify(
                                            "Please provide a name.",
                                            NotificationType.Warning
                                        ),
                                        IfError(
                                            Patch(
                                                TransactionCategories,
                                                If(
                                                    varNewItem,
                                                    Defaults(TransactionCategories),
                                                    varEditItem
                                                ),
                                                {
                                                    Profile: gvarSelectedRole.Profile,
                                                    Name: TrimEnds(NameInputCs.Text),
                                                    'Parent': If(
                                                        IsChildOfCheckboxCs.Value,
                                                        ParentInputCs.Selected
                                                    ),
                                                    Type: TypeInputCs.Selected.Value,
                                                    Color: Switch(// Will change this input to a user-selected color at some time
                                                        TypeInputCs.Selected.Value,
                                                        TransactionTypes.'Money In',
                                                        "#7a8b75",
                                                        TransactionTypes.'Money Out',
                                                        "#a14e3a",
                                                        TransactionTypes.Transfer,
                                                        "#7b5e57"
                                                    )
                                                }
                                            ),
                                            Notify(
                                                Concatenate(
                                                    "There was an error ",
                                                    If(
                                                        varNewItem,
                                                        "creating",
                                                        "updating"
                                                    ),
                                                    " the category."
                                                ),
                                                NotificationType.Error
                                            ),
                                            Concurrent(
                                                Select(CancelIconCs),
                                                Notify(
                                                    "Success",
                                                    NotificationType.Success
                                                )
                                            )
                                        );
                                    )
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Save"
                              Width: =Parent.Width
                  - RemoveContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: =Not(IsBlank(varScreenReuse))
                        Width: =Self.Height
                      Children:
                        - RemoveIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =label_off_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Switch(
                                    varScreenReuse,
                                    "splits",
                                    ForAll(
                                        SplitTransactionsGallery.AllItems As Gallery,
                                        Patch(
                                            colTransactionSplits,
                                            Gallery,
                                            {
                                                Description: TrimEnds(Gallery.SplitDescriptionInput5.Text),
                                                Amount: Value(Gallery.SplitAmountInput5.Text),
                                                Category: If(
                                                    Or(
                                                        And(
                                                            Gallery.Guid = SplitTransactionsGallery.Selected.Guid,
                                                            Not(IsBlank(Gallery.Guid))
                                                        ),
                                                        And(
                                                            Gallery.'Import Sequence Number' = SplitTransactionsGallery.Selected.'Import Sequence Number',
                                                            IsBlank(Gallery.Guid)
                                                        )
                                                    ),
                                                    Blank(),
                                                    Gallery.Category
                                                )
                                            }
                                        )
                                    ),
                                    "transaction",
                                    UpdateTransaction.Run(
                                        gvarTransaction.Guid,
                                        {text_1: "null"}
                                    );
                                    Refresh(Transactions);
                                    Set(
                                        gvarTransaction,
                                        LookUp(
                                            Transactions,
                                            Guid = gvarTransaction.Guid
                                        )
                                    ),
                                    "budget",
                                    Concurrent(
                                        Set(
                                            gvarBudgetCategory,
                                            Blank()
                                        ),
                                        Set(
                                            gvarBudgetCategoryRemoved,
                                            true
                                        )
                                    ),
                                    "transactionList",
                                    UpdateTransaction.Run(
                                        TransactionsGallery.Selected.Guid,
                                        {text_1: "null"}
                                    );
                                    Refresh(Transactions)
                                );
                                Select(CancelIconCs)
                              PaddingBottom: =Parent.Height/6
                              PaddingLeft: =Parent.Height/6
                              PaddingRight: =Parent.Height/6
                              PaddingTop: =Parent.Height/6
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Remove"
                              Width: =Parent.Width
                  - CancelContainerCs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(161, 78, 58, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =Or(
                              varNewItem,
                              Not(IsBlank(varEditItem)),
                              Not(IsBlank(varScreenReuse))
                          )
                        Width: =Self.Height
                      Children:
                        - CancelIconCs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =close_500dp_A14E3A_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =If(
                                    Not(IsBlank(varScreenReuse)),
                                    Back(ScreenTransition.UnCoverRight)
                                );
                                UpdateContext(
                                    {
                                        varNewItem: false,
                                        varReset: true,
                                        varNameError: false,
                                        varEditItem: Blank(),
                                        varScreenReuse: Blank(),
                                        varCategory: Blank()
                                    }
                                );

                          codecount: 1
                      },
                      {
                          symbol: "lei",
                          codes: ["RON"],
                          codecount: 1
                      }
                  ]
              )
          ),
          Concurrent(
              Set(
                  gvarUserError,
                  true
              ),
              AppLaunchError.Run(
                  User().FullName,
                  gvarProfile.Guid,
                  {text_1: JSON(FirstError)}
              )
          )
      );
      Concurrent(
          IfError(
              LoadData(
                  colTransactionVisibility,
                  "colTransactionVisibility",
                  false
              ),
              ClearCollect(
                  colTransactionVisibility,
                  {Value: true}
              );
              SaveData(
                  colTransactionVisibility,
                  "colTransactionVisibility"
              )
          ),
          IfError(
              LoadData(
                  colReportDisplay,
                  "colReportDisplay",
                  false
              ),
              ClearCollect(
                  colReportDisplay,
                  {
                      NumColumns: 3,
                      ColumnOrder: {
                          Index: 1,
                          Value: [
                              "Budget",
                              "Actual",
                              "Act. - Bud."
                          ]
                      }
                  }
              );
              SaveData(
                  colReportDisplay,
                  "colReportDisplay"
              )
          )
      );
      Set(
          gvarAppLaunching,
          false
      )
    StartScreen: =HomeScreen
    Theme: =PowerAppsTheme

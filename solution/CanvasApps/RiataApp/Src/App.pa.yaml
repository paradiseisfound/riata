                  ]
              ),
              ClearCollect(
                  colCurrencies,
                  [
                      {
                          symbol: "$",
                          codes: [
                              "USD",
                              "CAD"
                          ],
                          codecount: 2
                      },
                      {
                          symbol: "€",
                          codes: ["EUR"],

App:
  Properties:
    BackEnabled: =false
    OnError: |-
      =If(
          Not(
              IsMatch(
                  FirstError.Message,
                  "^The value '.*' cannot be converted to a number\.$"
              )
          ),
          Notify(
              FirstError.Message,
              NotificationType.Error
          )
      )
    OnStart: |-
      =Set(
          gvarAppLaunching,
          true
      );
      IfError(
          If(
              IsBlank(First(Profiles)),
              CreatePlaidUser.Run(
                  Coalesce(
                      Value(
                          ParseJSON(
                              JSON(
                                  First(
                                      Choices(
                                          PlaidLanguages,
                                          Left(
                                              Language(),
                                              2
                                          )
                                      )
                                  )
                              )
                          ).Value
                      ),
                      2
                  ),
                  If(
                      CountRows(
                          Split(
                              Language(),
                              "-"
                          )
                      ) = 1,
                      "0",
                      Coalesce(
                          Text(
                              ParseJSON(
                                  JSON(
                                      First(
                                          Choices(
                                              PlaidSupportedCountries,
                                              Last(
                                                  Split(
                                                      Language(),
                                                      "-"
                                                  )
                                              ).Value
                                          )
                                      )
                                  )
                              ).Value
                          ),
                          "0"
                      )
                  )
              )
          );
          Refresh(Profiles);
          Set(
              gvarProfile,
              First(Profiles)
          );
          If(
              IsEmpty(
                  Filter(
                      Roles,
                      SystemUser.'Azure AD Object ID' = User().EntraObjectId,
                      Profile.Guid = gvarProfile.Guid
                  )
              ),
              CreateRole.Run(
                  gvarProfile.Guid,
                  User().EntraObjectId
              )
          );
          Refresh(Roles);
          Concurrent(
              Set(
                  gvarSelectedRole,
                  First(
                      Filter(
                          Roles,
                          SystemUser.'Azure AD Object ID' = User().EntraObjectId,
                          Profile.Guid = gvarProfile.Guid
                      )
                  )
              ),
              Set(
                  envarUpdateItemWebhooks,
                  LookUp(
                      'Environment Variable Values',
                      'Schema Name' = "mda_UpdateItemWebhookInApp",
                      Value
                  ) = "yes"
              ),
              Set(
                  envarFlowRunVisible,
                  LookUp(
                      'Environment Variable Values',
                      'Schema Name' = "mda_FlowActionInApp",
                      Value
                  ) = "yes"
              ),
              ClearCollect(
                  colLanguages,
                  [
                      {
                          code: "da",
                          englishName: "Danish",
                          nativeName: "Dansk"
                      },
                      {
                          code: "nl",
                          englishName: "Dutch",
                          nativeName: "Nederlands"
                      },
                      {
                          code: "en",
                          englishName: "English",
                          nativeName: "English"
                      },
                      {
                          code: "et",
                          englishName: "Estonian",
                          nativeName: "Eesti"
                      },
                      {

Screens:
  InstitutionsScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      Width: =App.Width
    Children:
      - ContainerIs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - InstitutionsGallery:
                Control: Gallery@2.15.0
                Variant: VariableHeight
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Default: ={}
                  Height: |-
                    =Sum(
                        Parent.Height,
                        -Self.Y,
                        -(Parent.Height - ActionContainerIs.Y),
                        -Parent.Width / 9,
                        Self.TemplatePadding
                    )
                  Items: |-
                    =Sort(
                        Filter(
                            AccessTokens,
                            Profile.Guid = gvarSelectedRole.Profile.Guid
                        ),
                        Institution.Name//making a safe assumption that a profile won't have more institutions than the delegable limit. The filter function is still delegated.
                    )
                  LoadingSpinnerColor: =RGBA(123, 94, 87, 1)
                  ShowScrollbar: =false
                  TemplatePadding: =30
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderIs.Height,
                        Parent.Width / 9,
                        -Self.TemplatePadding
                    )
                Children:
                  - SyncErrorInfoContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(196, 154, 90, 1)
                        BorderThickness: =4
                        DropShadow: =DropShadow.None
                        Height: =SyncErrorInfoIs.Height
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: |-
                          =And(
                              ThisItem.PlaidAccessStatus <> "SESSION_FINISHED",
                              ThisItem.PlaidAccessStatus <> "LOGIN_REPAIRED",
                              ThisItem.IsSelected
                          )
                        Width: =InstitutionLabelIs.Width - InstitutionLabelIs.RadiusBottomLeft - InstitutionLabelIs.RadiusBottomRight
                        X: =InstitutionLabelIs.RadiusBottomLeft + InstitutionLabelIs.X
                        Y: =100
                      Children:
                        - SyncErrorInfoIs:
                            Control: Label@2.5.1
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Lighter
                              PaddingBottom: =25
                              PaddingLeft: =25
                              PaddingRight: =25
                              PaddingTop: =25
                              Size: =16
                              Text: ="Institution is out of sync. Repair connection to restore functionality."
                              Width: =Parent.Width
                  - InstitutionLabelIs:
                      Control: Classic/Button@2.2.0
                      Properties:
                        Align: =Align.Left
                        BorderColor: =ColorValue(ThisItem.Institution.PrimaryColor)
                        BorderThickness: =8
                        Color: |-
                          =If(
                              ThisItem.IsSelected,
                              RGBA(
                                  255,
                                  255,
                                  255,
                                  1
                              ),
                              ColorValue(ThisItem.Institution.PrimaryColor)
                          )
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: |-
                          =If(
                              ThisItem.IsSelected,
                              ColorValue(ThisItem.Institution.PrimaryColor),
                              RGBA(
                                  255,
                                  255,
                                  255,
                                  1
                              )
                          )
                        FocusedBorderThickness: =Self.BorderThickness
                        Font: =Font.'Open Sans'
                        Height: =100
                        HoverBorderColor: =ColorValue(ThisItem.Institution.PrimaryColor)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorValue(ThisItem.Institution.PrimaryColor)
                        OnSelect: =
                        PaddingLeft: =LogoIs.Width + Self.Width/12
                        PaddingRight: =25
                        PressedBorderColor: =Self.HoverBorderColor
                        PressedColor: =Self.HoverColor
                        PressedFill: =Self.HoverFill
                        RadiusBottomLeft: =Self.Height/2
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/2
                        RadiusTopRight: =Self.Height/3
                        Text: =ThisItem.Institution.Name
                        Width: =(Parent.Width - Parent.TemplatePadding*2) - Self.X*2
                        X: =(Parent.Width- Parent.TemplatePadding*2)/9
                  - LogoIs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        Fill: =ColorValue(ThisItem.Institution.PrimaryColor)
                        Height: =100
                        HoverBorderColor: =Self.BorderColor
                        HoverFill: =Self.Fill
                        Image: |-
                          =Coalesce(
                              ThisItem.Institution.Logo,
                              account_balance_500dp_FFFFFF_FILL0_wght500_GRAD0_opsz48
                          )
                        OnSelect: =Select(Parent)
                        PaddingBottom: |-
                          =If(
                              IsBlank(ThisItem.Institution.Logo),
                              20,
                              5
                          )
                        PaddingLeft: |-
                          =If(
                              IsBlank(ThisItem.Institution.Logo),
                              15,
                              0
                          )
                        PaddingRight: |-
                          =If(
                              IsBlank(ThisItem.Institution.Logo),
                              20,
                              5
                          )
                        PaddingTop: |-
                          =If(
                              IsBlank(ThisItem.Institution.Logo),
                              20,
                              5
                          )
                        PressedBorderColor: =Self.BorderColor
                        PressedFill: =Self.Fill
                        RadiusBottomLeft: =Self.Height/2
                        RadiusBottomRight: =Self.Height/2
                        RadiusTopLeft: =Self.Height/2
                        RadiusTopRight: =Self.Height/2
                        Width: =100
                        X: =(Parent.Width- Parent.TemplatePadding*2)/9
                  - SyncErrorIconIs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DisabledBorderColor: =RGBA(0, 0, 0, 0)
                        DisabledFill: =RGBA(224, 224, 224, 1)
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =90
                        Image: =sync_problem_500dp_C49A5A_FILL0_wght500_GRAD0_opsz48
                        OnSelect: =Select(Parent)
                        PaddingBottom: =10
                        PaddingLeft: =10
                        PaddingRight: =10
                        PaddingTop: =10
                        RadiusBottomLeft: =Self.Height/2
                        RadiusBottomRight: =Self.Height/2
                        RadiusTopLeft: =Self.Height/2
                        RadiusTopRight: =Self.Height/2
                        Visible: |-
                          =And(
                              ThisItem.PlaidAccessStatus <> "SESSION_FINISHED",
                              ThisItem.PlaidAccessStatus <> "LOGIN_REPAIRED"
                          )
                        Width: =Self.Height
                        X: =(Parent.Width- Parent.TemplatePadding*2)/9+2.5
                        Y: =InstitutionLabelIs.Height/2 - Self.Height/2
            - NoItemsLabelIs:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.Height - Self.Y
                  PaddingBottom: =0
                  PaddingLeft: =50
                  PaddingRight: =50
                  PaddingTop: =40
                  Text: ="No institutions found"
                  VerticalAlign: =VerticalAlign.Top
                  Visible: =InstitutionsGallery.AllItemsCount = 0
                  Width: =Parent.Width
                  Y: =ScreenHeaderIs.Height
            - ActionContainerIs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width - Self.X*2
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIconIs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Back(ScreenTransition.Fade);
                                Reset(InstitutionsGallery)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - AddInstitutionContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =RGBA(
                                  122,
                                  139,
                                  117,
                                  1
                              )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - AddInstitutionIconIs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =account_balance_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varLink: {
                                            Visible: true,
                                            LanguageCountryVisible: true,
                                            UpdateLink: false
                                        }
                                    }
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="New"
                              Width: =Parent.Width
                  - AddAccountsContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =If(
                              And(
                                  InstitutionsGallery.Selected.PlaidAccessStatus <> "SESSION_FINISHED",
                                  InstitutionsGallery.Selected.PlaidAccessStatus <> "LOGIN_REPAIRED",
                                  Not(IsBlank(InstitutionsGallery.Selected))
                              ),
                              RGBA(
                                  196,
                                  154,
                                  90,
                                  1
                              ),
                              RGBA(
                                  122,
                                  139,
                                  117,
                                  1
                              )
                          )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - AddAccountsIconIs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(InstitutionsGallery.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: |-
                                =If(
                                    And(
                                        InstitutionsGallery.Selected.PlaidAccessStatus <> "SESSION_FINISHED",
                                        InstitutionsGallery.Selected.PlaidAccessStatus <> "LOGIN_REPAIRED",
                                        Not(IsBlank(InstitutionsGallery.Selected))
                                    ),
                                    build_500dp_C49A5A_FILL0_wght500_GRAD0_opsz48,
                                    create_new_folder_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                                )
                              OnSelect: |-
                                =UpdateContext({varLink: {UpdateLink: true}});
                                Select(LaunchButtonIs)
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Add Accounts"
                              Width: =Parent.Width
                  - AccountsContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - AccountsIconIs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    Not(IsBlank(InstitutionsGallery.Selected)),
                                    DisplayMode.Edit,
                                    DisplayMode.Disabled
                                )
                              Height: =Parent.Height
                              Image: =topic_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Set(
                                    gvarAccountsFilter,
                                    {
                                        Visible: false,
                                        Applied: true,
                                        AccessTokenChecked: true,
                                        AccessTokens: [InstitutionsGallery.Selected]
                                    }
                                );
                                Navigate(
                                    AccountsScreen,
                                    ScreenTransition.Fade
                                )
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Accounts"
                              Width: =Parent.Width
                  - TransactionsContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - TransactionsIconIs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    Not(IsBlank(InstitutionsGallery.Selected)),
                                    DisplayMode.Edit,
                                    DisplayMode.Disabled
                                )
                              Height: =Parent.Height
                              Image: =wallet_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Concurrent(
                                    Reset(CategoriesGalleryCs),
                                    Reset(SearchInputCs),
                                    Set(
                                        gvarTransactionsFilter,
                                        {
                                            Visible: false,
                                            Applied: true,
                                            PendingChecked: false,
                                            DateChecked: false,
                                            AmountChecked: false,
                                            AccountChecked: true,
                                            CategoriesChecked: false,
                                            SplitsChecked: false,
                                            Pending: [
                                                true,
                                                false
                                            ],
                                            Accounts: InstitutionsGallery.Selected.BankAccounts,
                                            FirstAmount: -999999999999,
                                            SecondAmount: 999999999999,
                                            FirstDate: Date(
                                                2019,
                                                12,
                                                31
                                            ),
                                            //This is an arbitrary date. Assuming no transactions will be before this date.
                                            SecondDate: Today() + 1,
                                            //Assuming that there won't be transactions for the future.
                                            Categories: Blank(),
                                            Splits: [
                                                true,
                                                false
                                            ]
                                        }
                                    )
                                );
                                Navigate(
                                    TransactionsScreen,
                                    ScreenTransition.Fade
                                )
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Transactions"
                              Width: =Parent.Width
                  - DeleteContainerIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(161, 78, 58, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - DeleteIconIs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(InstitutionsGallery.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =delete_500dp_A14E3A_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext({varDeleteInstitution: InstitutionsGallery.Selected})
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Delete"
                              Width: =Parent.Width
            - ScreenHeaderIs:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Fill: =RGBA(123, 94, 87, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  OnSelect: =
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =Self.Height/3
                  Text: ="Institutions"
                  Width: =Parent.Width
            - RiataLogoIs:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  Image: ='Riata Hat'
                  OnSelect: |-
                    =Navigate(
                        HomeScreen,
                        ScreenTransition.Fade
                    );
                    Reset(InstitutionsGallery)
                  Tooltip: ="Home"
                  Width: =Self.Height*1.5
            - LinkContainerIs:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =Self.Fill
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(224, 224, 224, 0.9)
                  Height: =Parent.Height
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =varLink.Visible
                  Width: =Parent.Width
                Children:
                  - LinkModalIs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(139, 154, 159, 1)
                        BorderThickness: =2
                        DropShadow: =DropShadow.ExtraBold
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: |-
                          =Sum(
                              CancelButtonIs.Y,
                              CancelButtonIs.Height,
                              50
                          )
                        RadiusBottomLeft: |-
                          =Min(
                              Self.Width,
                              Self.Height
                          ) / 6
                        RadiusBottomRight: |-
                          =Min(
                              Self.Width,
                              Self.Height
                          ) / 6
                        RadiusTopLeft: |-
                          =Min(
                              Self.Width,
                              Self.Height
                          ) / 6
                        RadiusTopRight: |-
                          =Min(
                              Self.Width,
                              Self.Height
                          ) / 6
                        Visible: |-
                          =And(
                              Not(varLink.LanguageCountryVisible),
                              Not(IsBlank(varLink.LanguageCountryVisible))
                          )
                        Width: =Min(Sum(Parent.Width, - 80), 600)
                        X: =Parent.Width/2 - Self.Width/2
                        Y: =Parent.Height/2 - Self.Height/2
                      Children:
                        - LinkTimerIs:
                            Control: Timer@2.1.0
                            Properties:
                              AutoPause: =false
                              BorderColor: =ColorFade(Self.Fill, -15%)
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =0
                              Color: =RGBA(0, 0, 0, 0)
                              DisabledBorderColor: =ColorFade(Self.BorderColor, 70%)
                              DisabledColor: =ColorFade(Self.Fill, 90%)
                              DisabledFill: =ColorFade(Self.Fill, 70%)
                              DisplayMode: =DisplayMode.View
                              Duration: =3000
                              Fill: =RGBA(0, 0, 0, 0)
                              Font: =Font.'Open Sans'
                              Height: =0
                              HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                              OnTimerEnd: |-
                                =Refresh(Roles);
                                Set(
                                    gvarSelectedRole,
                                    LookUp(
                                        Roles,
                                        Guid = gvarSelectedRole.Guid
                                    )
                                );
                                If(

Screens:
  BudgetDetailScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =UpdateContext({varFromCalendarView: false});
        Refresh(BudgetEntries)
      OnVisible: =Refresh(BudgetEntries)
      Width: =App.Width
    Children:
      - ContainerBds:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - BudgetEntryGalleryBds:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Default: ={}
                  Height: =Parent.Height - Self.Y - ActionContainerBds.Height
                  Items: |-
                    =If(
                        varFilter.Applied,
                        Sort(
                            Search(
                                Filter(
                                    BudgetEntries,
                                    Budget.Profile.Guid = gvarSelectedRole.Profile.Guid,
                                    Status = If(
                                        varFilter.InactiveOccurrencesChecked,
                                        'Status (BudgetEntries)'.Inactive,
                                        'Status (BudgetEntries)'.Active
                                    ),
                                    Amount >= varFilter.FirstAmount,
                                    Amount <= varFilter.SecondAmount,
                                    Date >= varFilter.FirstDate,
                                    Date <= varFilter.SecondDate
                                ),
                                TrimEnds(SearchInputBds.Text),
                                Name
                            ),
                            Date
                        ),
                        Sort(
                            Search(
                                Filter(
                                    BudgetEntries,
                                    Budget.Profile.Guid = gvarSelectedRole.Profile.Guid,
                                    Status = 'Status (BudgetEntries)'.Active
                                ),
                                TrimEnds(SearchInputBds.Text),
                                Name
                            ),
                            Date
                        )
                    )
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  TemplateSize: =120
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderBds.Height,
                        SearchContainerBds.Height,
                        50
                    )
                Children:
                  - BackgroundBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(244,240,234,1)
                        Height: =120
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =ThisItem.IsSelected
                        Width: =Parent.Width
                  - DividingLineBds2:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(106, 122, 127, 1)
                        Height: =1
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - Self.X*2
                        X: =40
                        Y: =120
                  - AmountDisplayLabelBds:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: |-
                          =If(
                              ThisItem.Amount < 0,
                              RGBA(
                                  161,
                                  78,
                                  58,
                                  1
                              ),
                              RGBA(
                                  122,
                                  139,
                                  117,
                                  1
                              )
                          )
                        Font: =Font.'Open Sans'
                        Height: =50
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =Parent.Width*(2/3) + 20
                        PaddingRight: =50
                        PaddingTop: =0
                        Size: =20
                        Text: |-
                          =Text(
                              /*If(
                                  gvarDemoMode,
                                  -Value(ThisItem.RandomAmount),*/
                              ThisItem.Amount// )  // Would really like to add Random Amounts here
                          ,
                              "#,##0.00"
                          )
                        Tooltip: =Self.Text
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: =35
                  - DateDisplayLabelBds:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =50
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =50
                        PaddingRight: =Parent.Width/4 + 20
                        PaddingTop: =0
                        Size: =18
                        Text: |-
                          =Text(
                              ThisItem.Date,
                              "m/d/yyyy"
                          )
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: =60
                  - NameDisplayLabelBds:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =110
                        OnSelect: =Select(Parent)
                        PaddingBottom: =20
                        PaddingLeft: =50
                        PaddingRight: =Parent.Width/4 + 20
                        PaddingTop: =20
                        Text: =ThisItem.Name
                        Tooltip: =Self.Text
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
            - NoItemsLabelBds:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.Height - Self.Y
                  PaddingBottom: =0
                  PaddingLeft: =50
                  PaddingRight: =50
                  PaddingTop: =40
                  Text: ="No budget entries found"
                  VerticalAlign: =VerticalAlign.Top
                  Visible: =BudgetEntryGalleryBds.AllItemsCount = 0
                  Width: =Parent.Width
                  Y: =BudgetEntryGalleryBds.Y
            - ActionContainerBds:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - Self.X*2
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: =And(Not(varNewItem), IsBlank(varEditItem))
                        Width: =Self.Height
                      Children:
                        - BackIconBds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: =Back(ScreenTransition.UnCoverRight)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - ViewContainerBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =67
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: =And(Not(varNewItem), IsBlank(varEditItem))
                        Width: =Self.Height
                        X: =40
                        Y: =40
                      Children:
                        - ViewIconBds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =calendar_month_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: =Back(ScreenTransition.Fade)
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Calendar View"
                              Width: =Parent.Width
                  - AddBudgetContainerBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(122, 139, 117, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: =And(Not(varNewItem), IsBlank(varEditItem))
                        Width: =Self.Height
                      Children:
                        - AddBudgetIconBds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =calculate_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext({varNewItem: true})
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="New"
                              Width: =Parent.Width
                  - ViewBudgetContainerBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =RGBA(
                              122,
                              139,
                              117,
                              1
                          )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              Not(varNewItem),
                              IsBlank(varEditItem)
                          )
                        Width: =Self.Height
                      Children:
                        - ViewBudgetIconBds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(BudgetEntryGalleryBds.Selected),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =Parent.Height
                              Image: =edit_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varEditItem: LookUp(
                                            Budgets,
                                            Guid = BudgetEntryGalleryBds.Selected.Budget.Guid
                                        )
                                    }
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Edit"
                              Width: =Parent.Width
                  - ExportContainerBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        Fill: |-
                          =RGBA(
                              0,
                              0,
                              0,
                              0
                          )
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              Not(varNewItem),
                              IsBlank(varEditItem)
                          )
                        Width: =Self.Height
                      Children:
                        - ExportIconBds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Fill: |-
                                =RGBA(
                                    0,
                                    0,
                                    0,
                                    0
                                )
                              Height: =Parent.Height
                              Image: =output_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =If(
                                    Not(varFilter.Applied),
                                    Notify(
                                        "Apply a filter before exporting budget entries.",
                                        NotificationType.Warning
                                    ),
                                    Not(IsBlank(TrimEnds(SearchInputBds.Text))),
                                    Notify(
                                        "Remove any search terms before exporting budget entries.",
                                        NotificationType.Warning
                                    ),
                                    IsEmpty(BudgetEntryGalleryBds.AllItems),
                                    Notify(
                                        "Apply a filter that includes budget entries before exporting",
                                        NotificationType.Warning
                                    ),
                                    IfError(
                                        ExportBudgetEntries.Run(
                                            Concatenate(
                                                If(
                                                    varFilter.AmountChecked,
                                                    Switch(
                                                        varFilterType.Amount,
                                                        "Equal To",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""eq"" value=""",
                                                            Text(varFilter.FirstAmount),
                                                            """ />"
                                                        ),
                                                        "Greater Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""ge"" value=""",
                                                            Text(varFilter.FirstAmount),
                                                            """ />"
                                                        ),
                                                        "Less Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""le"" value=""",
                                                            Text(varFilter.SecondAmount),
                                                            """ />"
                                                        ),
                                                        "Between",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""ge"" value=""",
                                                            Text(varFilter.FirstAmount),
                                                            """ />",
                                                            "<condition attribute=""mda_amount"" operator=""le"" value=""",
                                                            Text(varFilter.SecondAmount),
                                                            """ />"
                                                        )
                                                    ),
                                                    Blank()
                                                ),
                                                If(
                                                    varFilter.DateChecked,
                                                    Switch(
                                                        varFilterType.Date,
                                                        "Equal To",
                                                        Concatenate(
                                                            "<condition attribute=""mda_date"" operator=""eq"" value=""",
                                                            Text(
                                                                varFilter.FirstDate,
                                                                "yyyy-mm-dd"
                                                            ),
                                                            """ />"
                                                        ),
                                                        "Greater Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_date"" operator=""ge"" value=""",
                                                            Text(
                                                                varFilter.FirstDate,
                                                                "yyyy-mm-dd"
                                                            ),
                                                            """ />"
                                                        ),
                                                        "Less Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_date"" operator=""le"" value=""",
                                                            Text(
                                                                varFilter.SecondDate,
                                                                "yyyy-mm-dd"
                                                            ),
                                                            """ />"
                                                        ),
                                                        "Between",// fix this?
                                                        Concatenate(
                                                            "mda_date ge ",
                                                            Concatenate(
                                                                Text(
                                                                    varFilter.FirstDate,
                                                                    "yyyy-mm-dd"
                                                                )
                                                            ),
                                                            " and mda_date le ",
                                                            Text(
                                                                varFilter.SecondDate,
                                                                "yyyy-mm-dd"
                                                            )
                                                        )
                                                    ),
                                                    Blank()
                                                ),
                                                Concatenate(
                                                    "<condition attribute=""statecode"" operator=""eq"" value=""",
                                                    If(
                                                        varFilter.InactiveOccurrencesChecked,
                                                        "1",
                                                        "0"
                                                    ),
                                                    """ />"
                                                )
                                            ),
                                            gvarProfile.Guid,
                                            {text_1: User().EntraObjectId}
                                        ),
                                        Notify(
                                            "There was an error generating the export",
                                            NotificationType.Error
                                        ),
                                        Notify(
                                            "You'll get a notification when the export is ready.",
                                            NotificationType.Success
                                        )
                                    )
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Export"
                              Width: =Parent.Width
                  - SaveContainerBds:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: |-
                          =RGBA(
                              122,
                              139,
                              117,
                              1
                          )
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =0
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =Or(
                              varNewItem,
                              Not(IsBlank(varEditItem))
                          )
                        Width: =Self.Height
                        X: =40
                        Y: =40
                      Children:
                        - SaveIconBds:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =check_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varNameError: IsBlank(TrimEnds(NameInputBds.Text)),
                                        varDateError: Or(
                                            IsBlank(DatePickerBds.SelectedDate),
                                            DatePickerBds.SelectedDate > DateAdd(
                                                Today(),
                                                5,
                                                TimeUnit.Years
                                            )
                                        ),
                                        varAmountError: IsBlank(AmountInputBds.Text),
                                        varRecurDateError: RecurrenceEndDateBds.SelectedDate > DateAdd(
                                            Today(),
                                            5,
                                            TimeUnit.Years
                                        ),
                                        varRecurDateOverlapError: And(
                                            RecursCkbxBds.Value,
                                            DatePickerBds.SelectedDate >= RecurrenceEndDateBds.SelectedDate,
                                            Not(IsBlank(RecurrenceEndDateBds.SelectedDate))
                                        )
                                    }
                                );
                                If(
                                    varNameError,
                                    Notify(
                                        "Please provide a title.",
                                        NotificationType.Warning
                                    ),
                                    Or(
                                        varDateError,
                                        varRecurDateError
                                    ),
                                    Notify(
                                        If(
                                            IsBlank(DatePickerBds.SelectedDate),
                                            "Please provide a date.",
                                            "Please provide a date earlier than 5 years from today."
                                        ),
                                        NotificationType.Warning
                                    ),
                                    varAmountError,
                                    Notify(
                                        "Please provide an amount.",
                                        NotificationType.Warning
                                    ),
                                    varRecurDateOverlapError,
                                    Notify(
                                        "Please provide dates that do not overlap with each other.",
                                        NotificationType.Warning
                                    ),
                                    IfError(
                                        UpdateContext(
                                            {
                                                varTempRecord: Patch(
                                                    Budgets,
                                                    If(
                                                        varNewItem,
                                                        Defaults(Budgets),
                                                        varEditItem
                                                    ),
                                                    {
                                                        Profile: gvarSelectedRole.Profile,
                                                        Name: TrimEnds(NameInputBds.Text),
                                                        Category: If(
                                                            gvarBudgetCategoryRemoved,
                                                            Blank(),
                                                            Coalesce(
                                                                gvarBudgetCategory,
                                                                varEditItem.Category
                                                            )
                                                        ),
                                                        Notes: TrimEnds(NotesInputBds.Text),
                                                        Amount: Value(AmountInputBds.Text),
                                                        Date: DatePickerBds.SelectedDate,
                                                        Recurs: Coalesce(
                                                            RecursCkbxBds.Value,
                                                            false
                                                        ),
                                                        Recurrence: If(
                                                            RecursCkbxBds.Value,
                                                            RecurrencePickerBds.Selected.Value,
                                                            Blank()
                                                        ),
                                                        RecurrenceEnd: If(
                                                            RecursCkbxBds.Value,
                                                            RecurrenceEndDateBds.SelectedDate,
                                                            Blank()
                                                        )
                                                    }
                                                )
                                            }
                                        );
                                        If(
                                            Not(varNewItem),
                                            Remove(
                                                BudgetEntries,
                                                Filter(
                                                    BudgetEntries,
                                                    Budget.Guid = varEditItem.Guid
                                                )
                                            )
                                        );
                                        Patch(
                                            BudgetEntries,
                                            Filter(
                                                ShowColumns(
                                                    AddColumns(
                                                        Sequence(
                                                            If(
                                                                RecursCkbxBds.Value,
                                                                DateDiff(
                                                                    DatePickerBds.SelectedDate,
                                                                    Coalesce(
                                                                        RecurrenceEndDateBds.SelectedDate,
                                                                        DateAdd(
                                                                            Today(),
                                                                            5,
                                                                            TimeUnit.Years
                                                                        )
                                                                    ),
                                                                    If(
                                                                        RecurrencePickerBds.Selected.Value in [
                                                                            Recurrences.Daily,
                                                                            Recurrences.Weekly,
                                                                            Recurrences.'Bi-Weekly'
                                                                        ],
                                                                        TimeUnit.Days,
                                                                        RecurrencePickerBds.Selected.Value in [
                                                                            Recurrences.'Semi-Monthly',
                                                                            Recurrences.Monthly,
                                                                            Recurrences.'Bi-Monthly'
                                                                        ],
                                                                        TimeUnit.Months,
                                                                        RecurrencePickerBds.Selected.Value in [
                                                                            Recurrences.Quarterly,
                                                                            Recurrences.'Semi-Annually'
                                                                        ],
                                                                        TimeUnit.Quarters,
                                                                        RecurrencePickerBds.Selected.Value = Recurrences.Annually,
                                                                        TimeUnit.Years
                                                                    )
                                                                ) / If(
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.Weekly,
                                                                    7,
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.'Bi-Weekly',
                                                                    14,
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.'Semi-Monthly',
                                                                    0.5,
                                                                    Or(
                                                                        RecurrencePickerBds.Selected.Value = Recurrences.'Bi-Monthly',
                                                                        RecurrencePickerBds.Selected.Value = Recurrences.'Semi-Annually'
                                                                    ),
                                                                    2,
                                                                    1
                                                                ) + 2,
                                                                1
                                                            ),
                                                            0
                                                        ),
                                                        mda_Budget,
                                                        varTempRecord,
                                                        mda_date,
                                                        If(
                                                            And(
                                                                RecurrencePickerBds.Selected.Value = Recurrences.'Semi-Monthly',
                                                                Mod(
                                                                    Value,
                                                                    2
                                                                ) <> 0
                                                            ),
                                                            DateAdd(
                                                                DatePickerBds.SelectedDate - 15,
                                                                Value / 2 + 1,
                                                                TimeUnit.Months
                                                            ),
                                                            DateAdd(
                                                                DatePickerBds.SelectedDate,
                                                                Value * If(
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.Weekly,
                                                                    7,
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.'Bi-Weekly',
                                                                    14,
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.'Semi-Monthly',
                                                                    0.5,
                                                                    Or(
                                                                        RecurrencePickerBds.Selected.Value = Recurrences.'Bi-Monthly',
                                                                        RecurrencePickerBds.Selected.Value = Recurrences.'Semi-Annually'
                                                                    ),
                                                                    2,
                                                                    1
                                                                ),
                                                                If(
                                                                    RecurrencePickerBds.Selected.Value in [
                                                                        Recurrences.Daily,
                                                                        Recurrences.Weekly,
                                                                        Recurrences.'Bi-Weekly'
                                                                    ],
                                                                    TimeUnit.Days,
                                                                    RecurrencePickerBds.Selected.Value in [
                                                                        Recurrences.'Semi-Monthly',
                                                                        Recurrences.Monthly,
                                                                        Recurrences.'Bi-Monthly'
                                                                    ],
                                                                    TimeUnit.Months,
                                                                    RecurrencePickerBds.Selected.Value in [
                                                                        Recurrences.Quarterly,
                                                                        Recurrences.'Semi-Annually'
                                                                    ],
                                                                    TimeUnit.Quarters,
                                                                    RecurrencePickerBds.Selected.Value = Recurrences.Annually,
                                                                    TimeUnit.Years
                                                                )
                                                            )
                                                        )
                                                    ),
                                                    mda_date,
                                                    mda_Budget
                                                ),
                                                mda_date <= Min(
                                                    DateAdd(
                                                        Today(),
                                                        5,
                                                        TimeUnit.Years
                                                    ),
                                                    RecurrenceEndDateBds.SelectedDate
                                                )
                                            )
                                        ),

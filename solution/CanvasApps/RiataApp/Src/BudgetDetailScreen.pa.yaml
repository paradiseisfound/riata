                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =RGBA(0, 0, 0, 0)
                              Font: =Font.'Open Sans'
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              OnSelect: |-
                                =IfError(
                                    If(
                                        And(
                                            Or(
                                                varParentOccurrenceCount > 1,
                                                Not(IsBlank(varRestoreItem))
                                            ),
                                            IsBlank(varEditItem)
                                        ),
                                        Patch(
                                            BudgetEntries,
                                            Coalesce(
                                                varRemoveItem,
                                                varRestoreItem
                                            ),
                                            {
                                                Status: If(
                                                    Not(IsBlank(varRemoveItem)),
                                                    'Status (BudgetEntries)'.Inactive,
                                                    'Status (BudgetEntries)'.Active
                                                )
                                            }
                                        ),
                                        And(
                                            Or(
                                                And(
                                                    varParentOccurrenceCount <= 1,
                                                    IsBlank(varEditItem)
                                                ),
                                                Not(IsBlank(varEditItem))
                                            ),
                                            Not(IsBlank(varRemoveItem))
                                        ),
                                        Remove(
                                            Budgets,
                                            Coalesce(
                                                varEditItem,
                                                LookUp(
                                                    Budgets,
                                                    Guid = varRemoveItem.Budget.Guid
                                                )
                                            )
                                        ),
                                        And(
                                            Not(IsBlank(varRestoreItem)),
                                            Not(IsBlank(varEditItem))
                                        ),
                                        Patch(// Might need to revamp this at some point to handle more than undelegated limit?
                                            BudgetEntries,
                                            AddColumns(
                                                ShowColumns(
                                                    Filter(
                                                        BudgetEntries,
                                                        Status = 'Status (BudgetEntries)'.Inactive,
                                                        Budget.Guid = varEditItem.Guid
                                                    ),
                                                    Guid
                                                ),
                                                statecode,
                                                'Status (BudgetEntries)'.Active
                                            )
                                        )
                                    ),
                                    Notify(
                                        If(
                                            And(
                                                varParentOccurrenceCount > 1,
                                                IsBlank(varEditItem),
                                                Not(IsBlank(varRemoveItem))
                                            ),
                                            "There was an error removing the occurrence.",
                                            Not(IsBlank(varRemoveItem)),
                                            "There was an error deleting the series.",
                                            And(
                                                IsBlank(varEditItem),
                                                Not(IsBlank(varRestoreItem))
                                            ),
                                            "There was an error restoring the occurrence.",
                                            Not(IsBlank(varRestoreItem)),
                                            "There was an error restoring the series."
                                        ),
                                        NotificationType.Error
                                    ),
                                    Notify(
                                        If(
                                            And(
                                                varParentOccurrenceCount > 1,
                                                IsBlank(varEditItem),
                                                Not(IsBlank(varRemoveItem))
                                            ),
                                            "Occurrence removed.",
                                            Not(IsBlank(varRemoveItem)),
                                            "Series deleted.",
                                            And(
                                                IsBlank(varEditItem),
                                                Not(IsBlank(varRestoreItem))
                                            ),
                                            "Occurrence restored.",
                                            Not(IsBlank(varRestoreItem)),
                                            "Series restored."
                                        ),
                                        NotificationType.Success
                                    );
                                    Select(CancelIconBds)
                                )
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =Self.Fill
                              PressedFill: =Self.Color
                              RadiusBottomLeft: =30
                              RadiusBottomRight: =30
                              RadiusTopLeft: =30
                              RadiusTopRight: =30
                              Size: =22
                              Text: |-
                                =If(
                                    And(
                                        Or(
                                            varParentOccurrenceCount <= 1,
                                            Not(IsBlank(varEditItem))
                                        ),
                                        Not(IsBlank(varRemoveItem))
                                    ),
                                    "Delete",
                                    Not(IsBlank(varRemoveItem)),
                                    "Remove",
                                    Not(IsBlank(varRestoreItem)),
                                    "Restore"
                                )
                              Width: =175
                              X: =CancelButtonBds.Width + CancelButtonBds.X*2
                              Y: |-
                                =Sum(
                                    ConfirmTextBds.Height,
                                    CancelButtonBds.X
                                )

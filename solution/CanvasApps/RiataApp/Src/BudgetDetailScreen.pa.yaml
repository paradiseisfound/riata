                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varReset: true,
                                        varDateError: false,
                                        varAmountError: false,
                                        varFilter: Blank(),
                                        varFilterType: {
                                            Date: "Equal To",
                                            Amount: "Equal To"
                                        }
                                    }
                                );
                                UpdateContext({varReset: false})
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =Self.Fill
                              PressedFill: =Self.Color

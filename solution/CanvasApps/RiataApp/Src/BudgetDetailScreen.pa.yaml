                              X: =Parent.Width/9
                              Y: =Parent.Height - Self.Height - Parent.Width/9
                        - ApplyFilterButtonBds:
                            Control: Classic/Button@2.2.0
                            Properties:
                              BorderColor: =Self.Fill
                              BorderThickness: =5
                              Color: =RGBA(255, 255, 255, 1)
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =RGBA(123, 94, 87, 1)
                              Font: =Font.'Open Sans'
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varDateError: And(
                                            DateFilterCheckboxBds.Value,
                                            Or(
                                                And(
                                                    varFilterType.Date <> "Between",
                                                    IsBlank(FirstDateFilterInputBds.SelectedDate)
                                                ),
                                                And(
                                                    varFilterType.Date = "Between",
                                                    Or(
                                                        IsBlank(SecondDateFilterInputBds.SelectedDate),
                                                        IsBlank(FirstDateFilterInputBds.SelectedDate)
                                                    )
                                                )
                                            )
                                        ),
                                        varAmountError: And(
                                            AmountFilterCheckboxBds.Value,
                                            Or(
                                                And(
                                                    varFilterType.Amount <> "Between",
                                                    IsBlank(FirstAmountFilterInputBds.Text)
                                                ),
                                                And(
                                                    varFilterType.Amount = "Between",
                                                    Or(
                                                        IsBlank(FirstAmountFilterInputBds.Text),
                                                        IsBlank(SecondAmountFilterInputBds.Text)
                                                    )
                                                )
                                            )
                                        )
                                    }
                                );
                                If(
                                    And(
                                        Not(varDateError),
                                        Not(varAmountError),
                                        Or(
                                            AmountFilterCheckboxBds.Value,
                                            DateFilterCheckboxBds.Value,
                                            InactiveFilterCheckboxBds.Value
                                        )
                                    ),
                                    UpdateContext(
                                        {
                                            varFilter: {
                                                Visible: false,
                                                Applied: true,
                                                DateChecked: DateFilterCheckboxBds.Value,
                                                AmountChecked: AmountFilterCheckboxBds.Value,
                                                InactiveOccurrencesChecked: InactiveFilterCheckboxBds.Value,
                                                FirstAmount: If(
                                                    AmountFilterCheckboxBds.Value,
                                                    Switch(
                                                        varFilterType.Amount,
                                                        "Equal To",
                                                        Value(FirstAmountFilterInputBds.Text),
                                                        "Greater Than or Equal",
                                                        Value(FirstAmountFilterInputBds.Text),
                                                        "Less Than or Equal",
                                                        -999999999999,
                                                        "Between",
                                                        Min(
                                                            Value(FirstAmountFilterInputBds.Text),
                                                            Value(SecondAmountFilterInputBds.Text)
                                                        )
                                                    ),
                                                    -999999999999
                                                ),
                                                SecondAmount: If(
                                                    AmountFilterCheckboxBds.Value,
                                                    Switch(
                                                        varFilterType.Amount,
                                                        "Equal To",
                                                        Value(FirstAmountFilterInputBds.Text),
                                                        "Greater Than or Equal",
                                                        999999999999,
                                                        "Less Than or Equal",
                                                        Value(FirstAmountFilterInputBds.Text),
                                                        "Between",
                                                        Max(
                                                            Value(FirstAmountFilterInputBds.Text),
                                                            Value(SecondAmountFilterInputBds.Text)
                                                        )
                                                    ),
                                                    999999999999
                                                ),
                                                FirstDate: If(
                                                    DateFilterCheckboxBds.Value,
                                                    Switch(
                                                        varFilterType.Date,
                                                        "Equal To",
                                                        FirstDateFilterInputBds.SelectedDate,
                                                        "Greater Than or Equal",
                                                        FirstDateFilterInputBds.SelectedDate,
                                                        "Less Than or Equal",
                                                        Date(
                                                            2019,
                                                            12,
                                                            31
                                                        ),//This is an arbitrary date. Assuming no transactions will be before this date.
                                                        "Between",
                                                        Min(
                                                            FirstDateFilterInputBds.SelectedDate,
                                                            SecondDateFilterInputBds.SelectedDate
                                                        )
                                                    ),
                                                    Date(
                                                        2019,
                                                        12,
                                                        31
                                                    )//This is an arbitrary date. Assuming no transactions will be before this date.
                                                ),
                                                SecondDate: If(
                                                    DateFilterCheckboxBds.Value,
                                                    Switch(
                                                        varFilterType.Date,
                                                        "Equal To",
                                                        FirstDateFilterInputBds.SelectedDate,
                                                        "Greater Than or Equal",
                                                        Date(
                                                            Year(Today()) + 5,
                                                            12,
                                                            31
                                                        ),
                                                        "Less Than or Equal",
                                                        FirstDateFilterInputBds.SelectedDate,
                                                        "Between",
                                                        Max(
                                                            FirstDateFilterInputBds.SelectedDate,
                                                            SecondDateFilterInputBds.SelectedDate
                                                        )
                                                    ),
                                                    Date(
                                                        Year(Today()) + 5,
                                                        12,
                                                        31
                                                    )
                                                )
                                            },
                                            varFilterType: {
                                                Date: If(
                                                    DateFilterCheckboxBds.Value,
                                                    varFilterType.Date,
                                                    "Equal To"
                                                ),
                                                Amount: If(
                                                    AmountFilterCheckboxBds.Value,
                                                    varFilterType.Amount,
                                                    "Equal To"
                                                )
                                            }
                                        }
                                    );
                                    Concurrent(
                                        If(
                                            Not(DateFilterCheckboxBds.Value),
                                            Reset(FirstDateFilterInputBds);
                                            Reset(SecondDateFilterInputBds),
                                            varFilterType.Date <> "Between",
                                            Reset(SecondDateFilterInputBds)
                                        ),
                                        If(
                                            Not(AmountFilterCheckboxBds.Value),
                                            Reset(FirstAmountFilterInputBds);
                                            Reset(SecondAmountFilterInputBds),
                                            varFilterType.Amount <> "Between",
                                            Reset(SecondAmountFilterInputBds)
                                        )
                                    ),
                                    Or(
                                        varDateError,
                                        varAmountError
                                    ),
                                    Notify(
                                        If(
                                            varAmountError,
                                            "Please provide an amount to filter.",
                                            varDateError,
                                            "Please provide a date to filter."
                                        ),
                                        NotificationType.Warning
                                    ),
                                    Select(ClearFilterButtonBds)
                                )
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              PressedBorderColor: =Self.BorderColor
                              PressedColor: =Self.Fill
                              PressedFill: =Self.Color
                              RadiusBottomLeft: =30
                              RadiusBottomRight: =30
                              RadiusTopLeft: =30
                              RadiusTopRight: =30
                              Text: ="Apply"
                              Width: =Parent.Width/3
                              X: =Parent.Width - Self.Width - Parent.Width/9
                              Y: =Parent.Height - Self.Height - Parent.Width/9

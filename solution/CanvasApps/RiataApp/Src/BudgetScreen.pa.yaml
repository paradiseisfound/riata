Screens:
  BudgetScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      Width: =App.Width
    Children:
      - ContainerBs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - ActionContainerBs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerBs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIconBs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: =Back(ScreenTransition.Fade)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - ViewContainerBs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =67
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                        X: =40
                        Y: =40
                      Children:
                        - ViewIconBs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =list_alt_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Navigate(
                                    BudgetDetailScreen,
                                    ScreenTransition.Fade
                                )
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="List View"
                              Width: =Parent.Width
                  - AddBudgetContainerBs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(122, 139, 117, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - AddBudgetIconBs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =calculate_500dp_7A8B75_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Navigate(
                                    BudgetDetailScreen,
                                    ScreenTransition.Cover,
                                    {
                                        varNewItem: true,
                                        varFromCalendarView: true
                                    }
                                )
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="New"
                              Width: =Parent.Width
            - DisplayContainerBs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(123, 94, 87, 1)
                  BorderThickness: =Self.Height/45
                  DropShadow: =DropShadow.Semibold
                  Height: =Parent.Width / 4.75 / 2
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  RadiusBottomLeft: =Self.Height/3
                  RadiusBottomRight: =Self.Height/3
                  RadiusTopLeft: =Self.Height/3
                  RadiusTopRight: =Self.Height/3
                  Width: |-
                    =Min(
                        Parent.Width - 100,
                        Sum(
                            BudgetDisplayDateBs.Width,
                            BudgetDisplayInputBs.Width,
                            Self.Height * 2,
                            Self.Height / 4,
                            100
                        )
                    )
                  X: =Parent.Width/2 - Self.Width/2
                  Y: =ActionContainerBs.Y - Self.Height
                Children:
                  - BackDateIconBs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        FocusedBorderThickness: =Self.BorderThickness
                        Image: =arrow_back_2_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                        LayoutMinHeight: =0
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext(
                              {
                                  varDisplayDate: If(
                                      BudgetDisplayInputBs.Selected.Value = "Month",
                                      DateAdd(
                                          Date(
                                              Year(BudgetDisplayDateBs.SelectedDate),
                                              Month(BudgetDisplayDateBs.SelectedDate),
                                              1
                                          ),
                                          -1,
                                          TimeUnit.Months
                                      ),
                                      DateAdd(
                                          DateAdd(
                                              BudgetDisplayDateBs.SelectedDate,
                                              -(Weekday(BudgetDisplayDateBs.SelectedDate) - 1),
                                              TimeUnit.Days
                                          ),
                                          -7,
                                          TimeUnit.Days
                                      )
                                  )
                              }
                          );
                          Reset(BudgetDisplayDateBs)
                        PaddingBottom: =Self.Height/6
                        PaddingLeft: =Self.Height/6
                        PaddingRight: =Self.Height/6
                        PaddingTop: =Self.Height/6
                        Width: =Self.Height
                  - BudgetDisplayDateBs:
                      Control: Classic/DatePicker@2.6.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        BorderThickness: =0
                        DefaultDate: |-
                          =Coalesce(
                              varDisplayDate,
                              Today()
                          )
                        EndYear: |-
                          =Sum(
                              Year(Today()),
                              5
                          )
                        FocusedBorderThickness: =Self.BorderThickness
                        Font: =Font.'Open Sans'
                        Format: ="m/d/yyyy"
                        IconBackground: =RGBA(0,0,0,0)
                        IconFill: =RGBA(123, 94, 87, 1)
                        InputTextPlaceholder: =
                        IsEditable: =true
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        Reset: =
                        Size: =Self.Height/3.75
                        StartYear: =2025
                        Width: =Self.Size * 8 + 50
                  - ForwardDateIconBs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        FocusedBorderThickness: =Self.BorderThickness
                        Image: =arrow_back_2_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                        ImageRotation: =ImageRotation.Rotate180
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        OnSelect: |-
                          =UpdateContext(
                              {
                                  varDisplayDate: If(
                                      BudgetDisplayInputBs.Selected.Value = "Month",
                                      DateAdd(
                                          Date(
                                              Year(BudgetDisplayDateBs.SelectedDate),
                                              Month(BudgetDisplayDateBs.SelectedDate),
                                              1
                                          ),
                                          1,
                                          TimeUnit.Months
                                      ),
                                      DateAdd(
                                          DateAdd(
                                              BudgetDisplayDateBs.SelectedDate,
                                              -(Weekday(BudgetDisplayDateBs.SelectedDate) - 1),
                                              TimeUnit.Days
                                          ),
                                          7,
                                          TimeUnit.Days
                                      )
                                  )
                              }
                          );
                          Reset(BudgetDisplayDateBs)
                        PaddingBottom: =Self.Height/6
                        PaddingLeft: =Self.Height/6
                        PaddingRight: =Self.Height/6
                        PaddingTop: =Self.Height/6
                        Width: =Self.Height
                  - DisplaySpacerBs:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DisplayMode: =DisplayMode.View
                        Fill: =RGBA(0, 0, 0, 0)
                        LayoutMinHeight: =0
                        LayoutMinWidth: =Parent.Height/4
                        Width: =Parent.Height/4
                  - BudgetDisplayInputBs:
                      Control: Classic/DropDown@2.3.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        BorderThickness: =0
                        ChevronBackground: =RGBA(0, 0, 0, 0)
                        ChevronFill: =RGBA(123, 94, 87, 1)
                        ChevronHoverBackground: =Self.ChevronBackground
                        ChevronHoverFill: =Self.SelectionColor
                        Default: ="Week"
                        FocusedBorderThickness: =Self.BorderThickness
                        Font: =Font.'Open Sans'
                        HoverBorderColor: =Self.BorderColor
                        HoverColor: =Self.SelectionColor
                        HoverFill: =Self.ChevronFill
                        Items: |-
                          =[
                              {
                                  Value: "Week",
                                  GalleryWrapCount: 1
                              },
                              {
                                  Value: "Two-Week",
                                  GalleryWrapCount: 2
                              },
                              {
                                  Value: "Month",
                                  GalleryWrapCount: 7
                              }
                          ]
                        Items.Value: =Value
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =Len(Self.Selected.Value)*Self.Size
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        OnChange: |-
                          =UpdateContext(
                              {
                                  varDisplayDate: If(
                                      Self.Selected.Value = "Month",
                                      Date(
                                          Year(BudgetDisplayDateBs.SelectedDate),
                                          Month(BudgetDisplayDateBs.SelectedDate),
                                          1
                                      ),
                                      DateAdd(
                                          BudgetDisplayDateBs.SelectedDate,
                                          -(Weekday(BudgetDisplayDateBs.SelectedDate) - 1),
                                          TimeUnit.Days
                                      )
                                  )
                              }
                          );
                          Reset(BudgetDisplayDateBs)
                        PaddingBottom: =0
                        PaddingLeft: =20
                        PaddingRight: =0
                        PaddingTop: =0
                        PressedBorderColor: =Self.BorderColor
                        PressedColor: =Self.Color
                        PressedFill: =Self.Fill
                        SelectionColor: =RGBA(255, 255, 255, 1)
                        SelectionFill: =RGBA(123, 94, 87, 1)
                        Size: =Self.Height/3.75
                        Width: =Len(Self.Selected.Value)*Self.Size*.8+90
                        X: =Sum(Parent.Width/12*2,BudgetDisplayDateBs.Width)
                        Y: =Sum(ScreenHeaderBs.Height,25)
            - BudgetEntriesGalleryBs:
                Control: Gallery@2.15.0
                Variant: Vertical
                Properties:
                  BorderColor: =RGBA(106, 122, 127, 1)
                  BorderThickness: =1
                  Height: |-
                    =Min(
                        Sum(
                            Parent.Height,
                            -ScreenHeaderBs.Height,
                            -ActionContainerBs.Height,
                            -DisplayContainerBs.Height,
                            -(Parent.Width / 4.75 / 4)
                        ),
                        If(
                            BudgetDisplayInputBs.Selected.Value = "Month",
                            Self.TemplateHeight * (WeekNum(
                                EOMonth(
                                    Date(
                                        Year(BudgetDisplayDateBs.SelectedDate),
                                        Month(BudgetDisplayDateBs.SelectedDate),
                                        1
                                    ),
                                    0
                                )
                            ) - WeekNum(
                                Date(
                                    Year(BudgetDisplayDateBs.SelectedDate),
                                    Month(BudgetDisplayDateBs.SelectedDate),
                                    1
                                )
                            ) + 1),
                            Self.TemplateHeight * 7
                        )
                    )
                  Items: |-
                    =AddColumns(
                        AddColumns(
                            Sequence(
                                Switch(
                                    BudgetDisplayInputBs.Selected.Value,
                                    "Week",
                                    7,
                                    "Two-Week",
                                    14,
                                    "Month",
                                    (WeekNum(
                                        EOMonth(
                                            Date(
                                                Year(BudgetDisplayDateBs.SelectedDate),
                                                Month(BudgetDisplayDateBs.SelectedDate),
                                                1
                                            ),
                                            0
                                        )
                                    ) - WeekNum(
                                        Date(
                                            Year(BudgetDisplayDateBs.SelectedDate),
                                            Month(BudgetDisplayDateBs.SelectedDate),
                                            1
                                        )
                                    ) + 1) * 7
                                ),
                                0
                            ),
                            Date,
                            If(
                                BudgetDisplayInputBs.Selected.Value = "Two-Week",
                                DateAdd(
                                    DateAdd(
                                        DateAdd(
                                            BudgetDisplayDateBs.SelectedDate,
                                            -(Weekday(BudgetDisplayDateBs.SelectedDate) - 1),
                                            TimeUnit.Days
                                        ),
                                        If(
                                            Mod(
                                                Value,
                                                2
                                            ) = 0,
                                            0,
                                            7
                                        ),
                                        TimeUnit.Days
                                    ),
                                    Value / 2,
                                    TimeUnit.Days
                                ),
                                DateAdd(
                                    If(
                                        BudgetDisplayInputBs.Selected.Value = "Month",
                                        DateAdd(
                                            Date(
                                                Year(BudgetDisplayDateBs.SelectedDate),
                                                Month(BudgetDisplayDateBs.SelectedDate),
                                                1
                                            ),
                                            -(Weekday(
                                                Date(
                                                    Year(BudgetDisplayDateBs.SelectedDate),
                                                    Month(BudgetDisplayDateBs.SelectedDate),
                                                    1
                                                )
                                            ) - 1),
                                            TimeUnit.Days
                                        ),
                                        DateAdd(
                                            BudgetDisplayDateBs.SelectedDate,
                                            -(Weekday(BudgetDisplayDateBs.SelectedDate) - 1),
                                            TimeUnit.Days
                                        )
                                    ),
                                    Value,
                                    TimeUnit.Days
                                )
                            )
                        ) As Sequence,
                        FilteredBudgetEntries,
                        ShowColumns(
                            Filter(
                                BudgetEntries As Entries,
                                Entries.Date = Sequence.Date
                            ),
                            Amount,
                            Name,
                            Date
                        )
                    )
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  TemplateSize: =220
                  Width: =Parent.Width
                  WrapCount: =BudgetDisplayInputBs.Selected.GalleryWrapCount
                  Y: |-
                    =Sum(
                        ScreenHeaderBs.Height,
                        ((DisplayContainerBs.Y - ScreenHeaderBs.Height - (Parent.Width / 4.75 / 4)) / 2 - Self.Height/2)
                    )
                Children:
                  - EntriesSubGalleryBs:
                      Control: Gallery@2.15.0
                      Variant: Vertical
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        Height: =Parent.TemplateHeight - Self.Y*2
                        Items: |-
                          =FirstN(
                              ThisItem.FilteredBudgetEntries,
                              3
                          )
                        ShowScrollbar: =false
                        TemplatePadding: =10
                        TemplateSize: =50
                        Visible: =BudgetDisplayInputBs.Selected.Value <> "Month"
                        Width: |-
                          =Parent.Width / BudgetDisplayInputBs.Selected.GalleryWrapCount - If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              0,
                              WeekdayLabelBs.Width
                          )
                        X: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              0,
                              100
                          )
                        Y: =10
                      Children:
                        - EntryLabelContainerBs:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              BorderStyle: =BorderStyle.None
                              DropShadow: =DropShadow.None
                              Fill: |-
                                =If(
                                    ThisItem.mda_amount < 0,
                                    RGBA(
                                        161,
                                        78,
                                        58,
                                        1
                                    ),
                                    RGBA(
                                        122,
                                        139,
                                        117,
                                        1
                                    )
                                )
                              Height: =50
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              RadiusBottomLeft: =10
                              RadiusBottomRight: =10
                              RadiusTopLeft: =10
                              RadiusTopRight: =10
                              Width: =Parent.Width - Self.X*3 - Parent.TemplatePadding*2
                              X: =10
                            Children:
                              - EntryLabelBs:
                                  Control: Label@2.5.1
                                  Properties:
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Color: =RGBA(255, 255, 255, 1)
                                    FillPortions: =1
                                    Font: =Font.'Open Sans'
                                    FontWeight: =FontWeight.Lighter
                                    Height: =Parent.Height
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinWidth: =0
                                    OnSelect: |-
                                      =Reset(SearchInputBds);
                                      Navigate(
                                          BudgetDetailScreen,
                                          ScreenTransition.Cover,
                                          {
                                              varFilter: {
                                                  Visible: false,
                                                  Applied: true,
                                                  DateChecked: true,
                                                  AmountChecked: false,
                                                  InactiveOccurrencesChecked: false,
                                                  FirstAmount: -999999999999,
                                                  SecondAmount: 999999999999,
                                                  FirstDate: ThisItem.mda_date,
                                                  SecondDate: ThisItem.mda_date
                                              },
                                              varFilterType: {
                                                  Field: Blank(),
                                                  Date: "Equal To",
                                                  Amount: "Equal To"
                                              }
                                          }
                                      )
                                    PaddingBottom: =0
                                    PaddingLeft: =25
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    Size: =20
                                    Text: =ThisItem.mda_name
                                    Width: =Parent.Width
                                    Wrap: =false
                              - EntryAmountLabelBs:
                                  Control: Label@2.5.1
                                  Properties:
                                    Align: =Align.Right
                                    BorderColor: =RGBA(0, 18, 107, 1)
                                    Color: =RGBA(255, 255, 255, 1)
                                    FillPortions: =0.5
                                    Font: =Font.'Open Sans'
                                    FontWeight: =FontWeight.Lighter
                                    Height: =Parent.Height
                                    LayoutMaxHeight: =
                                    LayoutMinWidth: =150
                                    OnSelect: |-
                                      =Reset(SearchInputBds);
                                      Navigate(
                                          BudgetDetailScreen,
                                          ScreenTransition.Cover,
                                          {
                                              varFilter: {
                                                  Visible: false,
                                                  Applied: true,
                                                  DateChecked: true,
                                                  AmountChecked: false,
                                                  InactiveOccurrencesChecked: false,
                                                  FirstAmount: -999999999999,
                                                  SecondAmount: 999999999999,
                                                  FirstDate: ThisItem.mda_date,
                                                  SecondDate: ThisItem.mda_date
                                              },
                                              varFilterType: {
                                                  Field: Blank(),
                                                  Date: "Equal To",
                                                  Amount: "Equal To"
                                              }
                                          }
                                      )
                                    PaddingBottom: =0
                                    PaddingLeft: =25
                                    PaddingRight: =25
                                    PaddingTop: =0
                                    Size: =20
                                    Text: |-
                                      =Text(
                                          ThisItem.mda_amount,
                                          " #,##0.00"
                                      )
                                    Width: =200
                                    Wrap: =false
                  - MoreEntriesContainerBs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(214, 194, 181, 1)
                        Height: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              90,
                              50
                          )
                        RadiusBottomLeft: =10
                        RadiusBottomRight: =10
                        RadiusTopLeft: =10
                        RadiusTopRight: =10
                        Visible: |-
                          =Or(
                              And(
                                  CountRows(ThisItem.FilteredBudgetEntries) > 3,
                                  BudgetDisplayInputBs.Selected.Value <> "Month"
                              ),
                              And(
                                  BudgetDisplayInputBs.Selected.Value = "Month",
                                  Not(IsEmpty(ThisItem.FilteredBudgetEntries)),
                                  Month(ThisItem.Date) = Month(BudgetDisplayDateBs.SelectedDate)
                              )
                          )
                        Width: |-
                          =Sum(
                              Parent.Width / BudgetDisplayInputBs.Selected.GalleryWrapCount,
                              If(
                                  BudgetDisplayInputBs.Selected.Value = "Month",
                                  -Self.X,
                                  -30
                              ),
                              -Self.X
                          )
                        X: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              Parent.Width / BudgetDisplayInputBs.Selected.GalleryWrapCount / 4,
                              120
                          )
                        Y: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              90,
                              140
                          )
                      Children:
                        - MoreEntriesLabelBs:
                            Control: Label@2.5.1
                            Properties:
                              Align: |-
                                =If(
                                    BudgetDisplayInputBs.Selected.Value = "Month",
                                    Align.Center,
                                    Align.Left
                                )
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =RGBA(255, 255, 255, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Lighter
                              Height: =Parent.Height
                              OnSelect: |-
                                =Reset(SearchInputBds);
                                Navigate(
                                    BudgetDetailScreen,
                                    ScreenTransition.Cover,
                                    {
                                        varFilter: {
                                            Visible: false,
                                            Applied: true,
                                            DateChecked: true,
                                            AmountChecked: false,
                                            InactiveOccurrencesChecked: false,
                                            FirstAmount: -999999999999,
                                            SecondAmount: 999999999999,
                                            FirstDate: ThisItem.Date,
                                            SecondDate: ThisItem.Date
                                        },
                                        varFilterType: {
                                            Field: Blank(),
                                            Date: "Equal To",
                                            Amount: "Equal To"
                                        }
                                    }
                                )
                              PaddingBottom: =0
                              PaddingLeft: |-
                                =If(
                                    BudgetDisplayInputBs.Selected.Value = "Month",
                                    0,
                                    25
                                )
                              PaddingRight: |-
                                =If(
                                    BudgetDisplayInputBs.Selected.Value = "Month",
                                    0,
                                    25
                                )
                              PaddingTop: =0
                              Size: =20
                              Text: |-
                                =If(
                                    BudgetDisplayInputBs.Selected.Value = "Month",
                                    Text(CountRows(ThisItem.FilteredBudgetEntries)),
                                    Concatenate(
                                        CountRows(ThisItem.FilteredBudgetEntries) - 3,
                                        " more ..."
                                    )
                                )
                              Width: =Parent.Width
                              Wrap: =false
                  - DividingLineBs2:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(106, 122, 127, 1)
                        Height: =Parent.TemplateHeight
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =1
                  - DividingLineBs1:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(106, 122, 127, 1)
                        Height: =1
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width / BudgetDisplayInputBs.Selected.GalleryWrapCount
                        Y: =Parent.TemplateHeight
                  - BackgroundBs:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DisplayMode: =DisplayMode.View
                        Fill: =RGBA(214, 221, 224, 1)
                        Height: =Parent.TemplateHeight
                        Visible: |-
                          =And(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              Month(ThisItem.Date) <> Month(BudgetDisplayDateBs.SelectedDate)
                          )
                        Width: =Parent.Width / BudgetDisplayInputBs.Selected.GalleryWrapCount
                  - WeekdayLabelBs:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        BorderThickness: =2
                        DisplayMode: |-
                          =If(
                              Or(
                                  BudgetDisplayInputBs.Selected.Value <> "Month",
                                  And(
                                      BudgetDisplayInputBs.Selected.Value = "Month",
                                      Month(ThisItem.Date) = Month(BudgetDisplayDateBs.SelectedDate)
                                  )
                              ),
                              DisplayMode.Edit,
                              DisplayMode.View
                          )
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              65,
                              Parent.TemplateHeight
                          )
                        OnSelect: |-
                          =Navigate(
                              BudgetDetailScreen,
                              ScreenTransition.Cover,
                              {
                                  varFilter: {
                                      Visible: false,
                                      Applied: true,
                                      DateChecked: true,
                                      AmountChecked: false,
                                      InactiveOccurrencesChecked: false,
                                      FirstAmount: -999999999999,
                                      SecondAmount: 999999999999,
                                      FirstDate: ThisItem.Date,
                                      SecondDate: ThisItem.Date
                                  },
                                  varFilterType: {
                                      Field: Blank(),
                                      Date: "Equal To",
                                      Amount: "Equal To"
                                  }
                              }
                          )
                        PaddingBottom: =0
                        PaddingLeft: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              10,
                              0
                          )
                        PaddingRight: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              10,
                              0
                          )
                        PaddingTop: =0
                        Size: =20
                        Text: |-
                          =If(
                              Or(
                                  And(
                                      BudgetDisplayInputBs.Selected.Value = "Two-Week",
                                      Mod(
                                          ThisItem.Value,
                                          2
                                      ) <> 0
                                  ),
                                  And(
                                      BudgetDisplayInputBs.Selected.Value = "Month",
                                      ThisItem.Value >= 7
                                  )
                              ),
                              Text(
                                  ThisItem.Date,
                                  "m/d"
                              ),
                              Text(
                                  ThisItem.Date,
                                  "ddd  m/d"
                              )
                          )
                        Width: |-
                          =If(
                              BudgetDisplayInputBs.Selected.Value = "Month",
                              Parent.Width / BudgetDisplayInputBs.Selected.GalleryWrapCount,
                              100
                          )
            - ScreenHeaderBs:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(255, 255, 255, 1)
                  Fill: =RGBA(123, 94, 87, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Semibold
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  PaddingBottom: =0
                  PaddingLeft: =0
                  PaddingRight: =0
                  PaddingTop: =0
                  Size: =Self.Height/3
                  Text: ="Budget"
                  Width: =Parent.Width
            - RiataLogoBs:
                Control: Image@2.2.3
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Height: |-
                    =Min(
                        Parent.Width / 8,
                        100
                    )
                  Image: ='Riata Hat'
                  OnSelect: |-
                    =Navigate(
                        HomeScreen,
                        ScreenTransition.Fade
                    )
                  Tooltip: ="Home"
                  Width: =Self.Height*1.5

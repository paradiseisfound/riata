                              Fill: =RGBA(123, 94, 87, 1)
                              Font: =Font.'Open Sans'
                              HoverBorderColor: =Self.BorderColor
                              HoverColor: =Self.Color
                              HoverFill: =Self.Fill
                              OnSelect: |-
                                =UpdateContext(
                                    {
                                        varDateError: And(
                                            DateFilterCheckbox.Value,
                                            Or(
                                                And(
                                                    varFilterType.Date <> "Between",
                                                    IsBlank(FirstDateFilterInput.SelectedDate)
                                                ),
                                                And(
                                                    varFilterType.Date = "Between",
                                                    Or(
                                                        IsBlank(SecondDateFilterInput.SelectedDate),
                                                        IsBlank(FirstDateFilterInput.SelectedDate)
                                                    )
                                                )
                                            )
                                        ),
                                        varAmountError: And(
                                            AmountFilterCheckbox.Value,
                                            Or(
                                                And(
                                                    varFilterType.Amount <> "Between",
                                                    IsBlank(FirstAmountFilterInput.Text)
                                                ),
                                                And(
                                                    varFilterType.Amount = "Between",
                                                    Or(
                                                        IsBlank(FirstAmountFilterInput.Text),
                                                        IsBlank(SecondAmountFilterInput.Text)
                                                    )
                                                )
                                            )
                                        ),
                                        varAccountError: And(
                                            AccountFilterCheckbox.Value,
                                            Or(
                                                IsEmpty(AccountFilterInput.SelectedItems),
                                                IsBlank(AccountFilterInput.SelectedItems)
                                            )
                                        )
                                    }
                                );
                                If(
                                    And(
                                        Not(varDateError),
                                        Not(varAmountError),
                                        Not(varAccountError),
                                        Or(
                                            AmountFilterCheckbox.Value,
                                            DateFilterCheckbox.Value,
                                            PendingFilterCheckbox.Value,
                                            AccountFilterCheckbox.Value,
                                            CategoryFilterCheckbox.Value,
                                            SplitsFilterCheckbox.Value
                                        )
                                    ),
                                    Set(
                                        gvarTransactionsFilter,
                                        {
                                            Visible: false,
                                            Applied: true,
                                            PendingChecked: PendingFilterCheckbox.Value,

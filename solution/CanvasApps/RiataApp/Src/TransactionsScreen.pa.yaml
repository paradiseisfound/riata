Screens:
  TransactionsScreen:
    Properties:
      Fill: =RGBA(224, 224, 224, 1)
      Height: =App.Height
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      Width: =App.Width
    Children:
      - ContainerTs:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            BorderStyle: =BorderStyle.None
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =App.Height
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: |-
              =Min(
                  App.Width,
                  1200
              )
            X: =Parent.Width/2 - Self.Width/2
          Children:
            - TransactionsGallery:
                Control: Gallery@2.15.0
                Variant: VariableHeight
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  Default: ={}
                  DelayItemLoading: =false
                  Height: |-
                    =Sum(
                        Parent.Height,
                        -Self.Y,
                        -ActionContainerTs.Height
                    )
                  Items: |-
                    =If(
                        And(
                            gvarTransactionsFilter.Applied,
                            Not(gvarTransactionsFilter.CategoriesChecked)
                        ),
                        SortByColumns(
                            Search(
                                Filter(
                                    Transactions,
                                    ProfileGuid = Text(gvarSelectedRole.Profile.Guid),
                                    BankAccount.PlaidAccountId in ShowColumns(
                                        gvarTransactionsFilter.Accounts,
                                        PlaidAccountId
                                    ),
                                    Pending in gvarTransactionsFilter.Pending,
                                    Amount >= gvarTransactionsFilter.FirstAmount,
                                    Amount <= gvarTransactionsFilter.SecondAmount,
                                    Date >= gvarTransactionsFilter.FirstDate,
                                    Date <= gvarTransactionsFilter.SecondDate,
                                    HasSplits in gvarTransactionsFilter.Splits
                                ),
                                TrimEnds(SearchInputTs.Text),
                                Description,
                                MerchantName,
                                CategoryLabel
                            ),
                            "mda_pending",
                            SortOrder.Descending,
                            "mda_date",
                            SortOrder.Descending
                        ),
                        And(
                            gvarTransactionsFilter.Applied,
                            gvarTransactionsFilter.CategoriesChecked,
                            gvarTransactionsFilter.Categories
                        ),
                        SortByColumns(
                            Search(
                                Filter(
                                    Transactions,
                                    ProfileGuid = Text(gvarSelectedRole.Profile.Guid),
                                    BankAccount.PlaidAccountId in ShowColumns(
                                        gvarTransactionsFilter.Accounts,
                                        PlaidAccountId
                                    ),
                                    Pending in gvarTransactionsFilter.Pending,
                                    Amount >= gvarTransactionsFilter.FirstAmount,
                                    Amount <= gvarTransactionsFilter.SecondAmount,
                                    Date >= gvarTransactionsFilter.FirstDate,
                                    Date <= gvarTransactionsFilter.SecondDate,
                                    HasSplits in gvarTransactionsFilter.Splits,
                                    CategoryLabel <> Blank()
                                ),
                                TrimEnds(SearchInputTs.Text),
                                Description,
                                MerchantName,
                                CategoryLabel
                            ),
                            "mda_pending",
                            SortOrder.Descending,
                            "mda_date",
                            SortOrder.Descending
                        ),
                        And(
                            gvarTransactionsFilter.Applied,
                            gvarTransactionsFilter.CategoriesChecked,
                            Not(gvarTransactionsFilter.Categories)
                        ),
                        SortByColumns(
                            Search(
                                Filter(
                                    Transactions,
                                    ProfileGuid = Text(gvarSelectedRole.Profile.Guid),
                                    BankAccount.PlaidAccountId in ShowColumns(
                                        gvarTransactionsFilter.Accounts,
                                        PlaidAccountId
                                    ),
                                    Pending in gvarTransactionsFilter.Pending,
                                    Amount >= gvarTransactionsFilter.FirstAmount,
                                    Amount <= gvarTransactionsFilter.SecondAmount,
                                    Date >= gvarTransactionsFilter.FirstDate,
                                    Date <= gvarTransactionsFilter.SecondDate,
                                    HasSplits in gvarTransactionsFilter.Splits,
                                    CategoryLabel = Blank()
                                ),
                                TrimEnds(SearchInputTs.Text),
                                Description,
                                MerchantName,
                                CategoryLabel
                            ),
                            "mda_pending",
                            SortOrder.Descending,
                            "mda_date",
                            SortOrder.Descending
                        ),
                        SortByColumns(
                            Search(
                                Filter(
                                    Transactions,
                                    ProfileGuid = Text(gvarSelectedRole.Profile.Guid)
                                ),
                                TrimEnds(SearchInputTs.Text),
                                Description,
                                MerchantName,
                                CategoryLabel
                            ),
                            "mda_pending",
                            SortOrder.Descending,
                            "mda_date",
                            SortOrder.Descending
                        )
                    )
                  LoadingSpinnerColor: =RGBA(123, 94, 87, 1)
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        ScreenHeaderTs.Height,
                        SearchContainerTs.Height,
                        50
                    )
                Children:
                  - BackgroundTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(244,240,234,1)
                        Height: =120
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =ThisItem.IsSelected
                        Width: =Parent.Width
                  - DividingLineTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        BorderStyle: =BorderStyle.None
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(106, 122, 127, 1)
                        Height: =1
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - Self.X*2
                        X: =40
                        Y: =120
                  - AmountLabelTs:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Right
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: |-
                          =If(
                              -Value(ThisItem.Amount) < 0,
                              RGBA(
                                  161,
                                  78,
                                  58,
                                  1
                              ),
                              RGBA(
                                  122,
                                  139,
                                  117,
                                  1
                              )
                          )
                        Font: =Font.'Open Sans'
                        Height: =50
                        Italic: =ThisItem.Pending
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =Parent.Width*(2/3) + 20
                        PaddingRight: =50
                        PaddingTop: =0
                        Size: =20
                        Text: |-
                          =Concatenate(
                              If(
                                  gvarShowCurrencySymbol,
                                  Concatenate(
                                      LookUp(
                                          colCurrencies,
                                          ThisItem.CurrencyCode in codes
                                      ).symbol,
                                      " "
                                  ),
                                  Blank()
                              ),
                              Text(
                                  If(
                                      gvarDemoMode,
                                      -Value(ThisItem.RandomAmount),
                                      -Value(ThisItem.Amount)
                                  ),
                                  "#,##0.00"
                              )
                          )
                        Tooltip: =Self.Text
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: |-
                          =If(
                              And(
                                  First(colTransactionVisibility).Value,
                                  Not(ThisItem.Pending)
                              ),
                              15,
                              35
                          )
                  - DateLabelTs:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Lighter
                        Height: =50
                        Italic: =ThisItem.Pending
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =150
                        PaddingRight: =Parent.Width/4 + 20
                        PaddingTop: =0
                        Size: =18
                        Text: |-
                          =If(
                              ThisItem.Pending,
                              "Pending",
                              Text(
                                  ThisItem.Date,
                                  "mm/dd/yyyy"
                              )
                          )
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                        Y: =60
                  - MerchantLogoTs:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Height: =80
                        Image: |-
                          =Coalesce(
                              ThisItem.LogoUrl,
                              ThisItem.FinanceCategoryUrl
                          )
                        OnSelect: =Select(Parent)
                        Width: =80
                        X: =50
                        Y: =20
                  - DescriptionLabelTs:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Font: =Font.'Open Sans'
                        FontWeight: =FontWeight.Semibold
                        Height: =110
                        OnSelect: =Select(Parent)
                        PaddingBottom: =20
                        PaddingLeft: =150
                        PaddingRight: =Parent.Width/4 + 20
                        PaddingTop: =20
                        Text: =ThisItem.Description
                        Tooltip: =Self.Text
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.TemplateWidth - Parent.TemplatePadding*2
                        Wrap: =false
                  - CategorySplitContainerTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        BorderColor: |-
                          =Coalesce(
                              ColorValue(ThisItem.Category.Color),
                              RGBA(
                                  123,
                                  94,
                                  87,
                                  1
                              )
                          )
                        BorderThickness: =2
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =35
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Visible: |-
                          =And(
                              First(colTransactionVisibility).Value,
                              Not(ThisItem.Pending)
                          )
                        Width: |-
                          =Min(
                              If(
                                  ThisItem.HasSplits,
                                  75,
                                  Len(
                                      Coalesce(
                                          ThisItem.CategoryLabel,
                                          "no category"
                                      )
                                  ) * 15 + 50
                              ),
                              Parent.Width / 3
                          )
                        X: |-
                          =Sum(
                              Parent.Width,
                              -Self.Width,
                              -50
                          )
                        Y: =67.5
                      Children:
                        - SplitIconTs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              DisplayMode: =DisplayMode.View
                              Height: =Parent.Height
                              Image: =arrow_split_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              PaddingBottom: =Self.Height/9
                              PaddingLeft: =Self.Height/9
                              PaddingRight: =Self.Height/9
                              PaddingTop: =Self.Height/9
                              Width: =Parent.Width
                        - CategoryValueTs:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: |-
                                =If(
                                    IsBlank(ThisItem.Category),
                                    RGBA(
                                        123,
                                        94,
                                        87,
                                        1
                                    ),
                                    RGBA(
                                        0,
                                        0,
                                        0,
                                        0
                                    )
                                )
                              BorderStyle: =BorderStyle.None
                              Color: |-
                                =If(
                                    IsBlank(ThisItem.Category),
                                    RGBA(
                                        117,
                                        117,
                                        117,
                                        1
                                    ),
                                    RGBA(
                                        255,
                                        255,
                                        255,
                                        1
                                    )
                                )
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              DisabledFill: =RGBA(244, 244, 244, 1)
                              Fill: |-
                                =Coalesce(
                                    ColorValue(ThisItem.Category.Color),
                                    RGBA(
                                        255,
                                        255,
                                        255,
                                        1
                                    )
                                )
                              Font: =Font.'Open Sans'
                              FontWeight: |-
                                =If(
                                    IsBlank(ThisItem.Category),
                                    FontWeight.Lighter,
                                    FontWeight.Semibold
                                )
                              Height: =Parent.Height
                              OnSelect: |-
                                =Navigate(
                                    CategoriesScreen,
                                    ScreenTransition.Cover,
                                    {
                                        varScreenReuse: "transactionList",
                                        varCategory: ThisItem.Category
                                    }
                                )
                              PaddingBottom: =0
                              PaddingLeft: =20
                              PaddingRight: =20
                              PaddingTop: =0
                              Size: =18
                              Text: |-
                                =Coalesce(
                                    ThisItem.Category.Name,
                                    "no category"
                                )
                              Visible: =Not(ThisItem.HasSplits)
                              Width: =Parent.Width
                              Wrap: =false
            - NoItemsLabelTs:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DisplayMode: =DisplayMode.View
                  Fill: =RGBA(255, 255, 255, 1)
                  Font: =Font.'Open Sans'
                  FontWeight: =FontWeight.Lighter
                  Height: =Parent.Height - Self.Y
                  PaddingBottom: =0
                  PaddingLeft: =50
                  PaddingRight: =50
                  PaddingTop: =40
                  Text: ="No transactions found"
                  VerticalAlign: =VerticalAlign.Top
                  Visible: =TransactionsGallery.AllItemsCount = 0
                  Width: =Parent.Width
                  Y: |-
                    =Sum(
                        SearchContainerTs.Y,
                        SearchContainerTs.Height,
                        25
                    )
            - ActionContainerTs:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  BorderColor: =RGBA(0, 0, 0, 0)
                  BorderStyle: =BorderStyle.None
                  DropShadow: =DropShadow.None
                  Height: =Parent.Width / 4.75
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =Self.Height/4
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingBottom: =Self.Height/4
                  PaddingLeft: =Self.Height/4
                  PaddingRight: =Self.Height/4
                  PaddingTop: =Self.Height/4
                  RadiusBottomLeft: =20
                  RadiusBottomRight: =20
                  RadiusTopLeft: =20
                  RadiusTopRight: =20
                  Width: =Parent.Width - Self.X*2
                  Y: |-
                    =Sum(
                        Parent.Height,
                        -Self.Height
                    )
                Children:
                  - BackContainerTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(123, 94, 87, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - BackIconTs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: =chevron_left_500dp_7B5E57_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =Concurrent(
                                    Reset(TransactionsGallery),
                                    Reset(SearchInputTs)
                                );
                                Back(ScreenTransition.Fade)
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Back"
                              Width: =Parent.Width
                  - VisibleContainerTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - VisibleIconTs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Height: =Parent.Height
                              Image: |-
                                =If(
                                    First(colTransactionVisibility).Value,
                                    visibility_off_500dp_4A6572_FILL0_wght500_GRAD0_opsz48,
                                    visibility_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                                )
                              OnSelect: |-
                                =ClearCollect(
                                    colTransactionVisibility,
                                    {
                                        Value: If(
                                            First(colTransactionVisibility).Value,
                                            false,
                                            true
                                        )
                                    }
                                );
                                SaveData(
                                    colTransactionVisibility,
                                    "colTransactionVisibility"
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: |-
                                =If(
                                    First(colTransactionVisibility).Value,
                                    "Hide",
                                    "Show"
                                )
                              Width: =Parent.Width
                  - ExportTransContainerTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        BorderColor: =RGBA(74, 101, 114, 1)
                        BorderThickness: =Self.Height/30
                        DropShadow: =DropShadow.Semibold
                        Fill: |-
                          =RGBA(
                              0,
                              0,
                              0,
                              0
                          )
                        FillPortions: =0
                        Height: =135
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =0
                        LayoutMinWidth: =0
                        RadiusBottomLeft: =Self.Height/3
                        RadiusBottomRight: =Self.Height/3
                        RadiusTopLeft: =Self.Height/3
                        RadiusTopRight: =Self.Height/3
                        Width: =Self.Height
                      Children:
                        - ExportTransIconTs:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(224, 224, 224, 1)
                              Fill: |-
                                =RGBA(
                                    0,
                                    0,
                                    0,
                                    0
                                )
                              Height: =Parent.Height
                              Image: =output_500dp_4A6572_FILL0_wght500_GRAD0_opsz48
                              OnSelect: |-
                                =If(
                                    Not(gvarTransactionsFilter.Applied),
                                    Notify(
                                        "Apply a filter before exporting transactions",
                                        NotificationType.Warning
                                    ),
                                    Not(IsBlank(TrimEnds(SearchInputTs.Text))),
                                    Notify(
                                        "Remove any search terms before exporting transactions",
                                        NotificationType.Warning
                                    ),
                                    IsEmpty(TransactionsGallery.AllItems),
                                    Notify(
                                        "Apply a filter that includes transactions before exporting",
                                        NotificationType.Warning
                                    ),
                                    IfError(
                                        ExportTransactions.Run(
                                            Concatenate(
                                                If(
                                                    gvarTransactionsFilter.PendingChecked,
                                                    Concatenate(
                                                        "<condition attribute=""mda_pending"" operator=""eq"" value=""",
                                                        Lower(First(gvarTransactionsFilter.Pending).Value),
                                                        """ />"
                                                    ),
                                                    Blank()
                                                ),
                                                If(
                                                    gvarTransactionsFilter.AmountChecked,
                                                    Switch(
                                                        varFilterType.Amount,
                                                        "Equal To",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""eq"" value=""",
                                                            Text(gvarTransactionsFilter.FirstAmount),
                                                            """ />"
                                                        ),
                                                        "Greater Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""le"" value=""",
                                                            Text(gvarTransactionsFilter.SecondAmount),
                                                            """ />"
                                                        ),
                                                        "Less Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""ge"" value=""",
                                                            Text(gvarTransactionsFilter.FirstAmount),
                                                            """ />"
                                                        ),
                                                        "Between",
                                                        Concatenate(
                                                            "<condition attribute=""mda_amount"" operator=""ge"" value=""",
                                                            Text(gvarTransactionsFilter.FirstAmount),
                                                            """ />",
                                                            "<condition attribute=""mda_amount"" operator=""le"" value=""",
                                                            Text(gvarTransactionsFilter.SecondAmount),
                                                            """ />"
                                                        )
                                                    ),
                                                    Blank()
                                                ),
                                                If(
                                                    gvarTransactionsFilter.DateChecked,
                                                    Switch(
                                                        varFilterType.Date,
                                                        "Equal To",
                                                        Concatenate(
                                                            "<condition attribute=""mda_date"" operator=""eq"" value=""",
                                                            Text(
                                                                gvarTransactionsFilter.FirstDate,
                                                                "yyyy-mm-dd"
                                                            ),
                                                            """ />"
                                                        ),
                                                        "Greater Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_date"" operator=""ge"" value=""",
                                                            Text(
                                                                gvarTransactionsFilter.FirstDate,
                                                                "yyyy-mm-dd"
                                                            ),
                                                            """ />"
                                                        ),
                                                        "Less Than or Equal",
                                                        Concatenate(
                                                            "<condition attribute=""mda_date"" operator=""le"" value=""",
                                                            Text(
                                                                gvarTransactionsFilter.SecondDate,
                                                                "yyyy-mm-dd"
                                                            ),
                                                            """ />"
                                                        ),
                                                        "Between",// fix this?
                                                        Concatenate(
                                                            "mda_date ge ",
                                                            Concatenate(
                                                                Text(
                                                                    gvarTransactionsFilter.FirstDate,
                                                                    "yyyy-mm-dd"
                                                                )
                                                            ),
                                                            " and mda_date le ",
                                                            Text(
                                                                gvarTransactionsFilter.SecondDate,
                                                                "yyyy-mm-dd"
                                                            )
                                                        )
                                                    ),
                                                    Blank()
                                                ),
                                                If(
                                                    gvarTransactionsFilter.AccountChecked,
                                                    Concatenate(
                                                        "<condition entityname=""bankaccount"" attribute=""mda_plaidaccountid"" operator=""in""><value>",
                                                        Concat(
                                                            ShowColumns(
                                                                gvarTransactionsFilter.Accounts,
                                                                PlaidAccountId
                                                            ),
                                                            mda_plaidaccountid,
                                                            "</value><value>"
                                                        ),
                                                        "</value></condition>"
                                                    ),
                                                    Blank()
                                                ),
                                                If(
                                                    gvarTransactionsFilter.SplitsChecked,
                                                    Concatenate(
                                                        "<condition attribute=""mda_hassplits"" operator=""eq"" value=""",
                                                        Lower(First(gvarTransactionsFilter.Splits).Value),
                                                        """ />"
                                                    ),
                                                    Blank()
                                                ),
                                                If(
                                                    gvarTransactionsFilter.CategoriesChecked,
                                                    Concatenate(
                                                        "<condition attribute=""mda_categorylabel"" operator=""",
                                                        If(
                                                            gvarTransactionsFilter.Categories,
                                                            "not-null",
                                                            "null"
                                                        ),
                                                        """ />"
                                                    ),
                                                    Blank()
                                                )
                                            ),
                                            gvarProfile.Guid,
                                            {text_1: User().EntraObjectId}
                                        ),
                                        Notify(
                                            "There was an error generating the export",
                                            NotificationType.Error
                                        ),
                                        Notify(
                                            "You'll get a notification when the export is ready.",
                                            NotificationType.Success
                                        )
                                    )
                                )
                              PaddingBottom: =Parent.Height/9
                              PaddingLeft: =Parent.Height/9
                              PaddingRight: =Parent.Height/9
                              PaddingTop: =Parent.Height/9
                              RadiusBottomLeft: =Parent.RadiusBottomLeft
                              RadiusBottomRight: =Parent.RadiusBottomRight
                              RadiusTopLeft: =Parent.RadiusTopLeft
                              RadiusTopRight: =Parent.RadiusTopRight
                              Tooltip: ="Export"
                              Width: =Parent.Width
                  - TransDetailContainerTs:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout

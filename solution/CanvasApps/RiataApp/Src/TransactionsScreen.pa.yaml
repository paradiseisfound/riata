                                                    "Equal To",
                                                    -Value(FirstAmountFilterInput.Text),
                                                    "Greater Than or Equal",
                                                    -Value(FirstAmountFilterInput.Text),
                                                    "Less Than or Equal",
                                                    999999999999,
                                                    "Between",
                                                    Max(
                                                        -Value(FirstAmountFilterInput.Text),
                                                        -Value(SecondAmountFilterInput.Text)
                                                    )
                                                ),
                                                999999999999
                                            ),
                                            FirstDate: If(
                                                DateFilterCheckbox.Value,
                                                Switch(
                                                    varFilterType.Date,
                                                    "Equal To",
                                                    FirstDateFilterInput.SelectedDate,
                                                    "Greater Than or Equal",
                                                    FirstDateFilterInput.SelectedDate,
                                                    "Less Than or Equal",
                                                    Date(
                                                        2019,
                                                        12,
                                                        31
                                                    ),//This is an arbitrary date. Assuming no transactions will be before this date.
                                                    "Between",
                                                    Min(
                                                        FirstDateFilterInput.SelectedDate,
                                                        SecondDateFilterInput.SelectedDate
                                                    )
                                                ),
                                                Date(
                                                    2019,
                                                    12,
                                                    31
                                                )//This is an arbitrary date. Assuming no transactions will be before this date.
                                            ),
                                            SecondDate: If(
                                                DateFilterCheckbox.Value,
                                                Switch(
                                                    varFilterType.Date,
                                                    "Equal To",
                                                    FirstDateFilterInput.SelectedDate,
                                                    "Greater Than or Equal",
                                                    Today() + 1,//Assuming that there won't be transactions for the future.
                                                    "Less Than or Equal",
                                                    FirstDateFilterInput.SelectedDate,
                                                    "Between",
                                                    Max(
                                                        FirstDateFilterInput.SelectedDate,
                                                        SecondDateFilterInput.SelectedDate
                                                    )
                                                ),
                                                Today() + 1//Assuming that there won't be transactions for the future.
                                            ),
                                            Categories: If(
                                                CategoryFilterCheckbox.Value,
                                                Not(CategoryFilterInput.Checked),
                                                Blank()
                                            ),
                                            Splits: If(
                                                SplitsFilterCheckbox.Value,
                                                [Not(SplitsFilterInput.Checked)],
                                                [
                                                    true,
                                                    false
                                                ]
                                            )
                                        }
                                    );
                                    UpdateContext(
                                        {
                                            varFilterType: {
                                                Date: If(
                                                    DateFilterCheckbox.Value,
                                                    varFilterType.Date,
                                                    "Equal To"
                                                ),
                                                Amount: If(
                                                    AmountFilterCheckbox.Value,
                                                    varFilterType.Amount,
                                                    "Equal To"
                                                )
                                            }
                                        }
                                    );
                                    Concurrent(
                                        If(
                                            Not(DateFilterCheckbox.Value),
                                            Reset(FirstDateFilterInput);
                                            Reset(SecondDateFilterInput),
                                            varFilterType.Date <> "Between",
                                            Reset(SecondDateFilterInput)
                                        ),
                                        If(
                                            Not(AmountFilterCheckbox.Value),
                                            Reset(FirstAmountFilterInput);
                                            Reset(SecondAmountFilterInput),

                                                    AccessToken.Profile.Guid = gvarSelectedRole.Profile.Guid
                                                )
                                            ),
                                            FirstAmount: If(
                                                AmountFilterCheckbox.Value,
                                                Switch(
                                                    varFilterType.Amount,
                                                    "Equal To",
                                                    -Value(FirstAmountFilterInput.Text),
                                                    "Greater Than or Equal",
                                                    -999999999999,
                                                    "Less Than or Equal",
                                                    -Value(FirstAmountFilterInput.Text),
                                                    "Between",
                                                    Min(
                                                        -Value(FirstAmountFilterInput.Text),
                                                        -Value(SecondAmountFilterInput.Text)
                                                    )
                                                ),
                                                -999999999999
                                            ),
                                            SecondAmount: If(
                                                AmountFilterCheckbox.Value,
                                                Switch(
